                          <div key={e.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4, background: '#1e293b', borderRadius: 8, padding: '7px 10px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                              <span style={{ fontSize: 12, fontWeight: 700, color: e.type === 'accrual' ? '#34d399' : '#f87171', minWidth: 52 }}>
                                {e.type === 'accrual' ? '+' : '−'}{e.hours.toFixed(2)} hrs
                              </span>
                              {e.date && <span style={{ fontSize: 11, color: '#64748b' }}>{e.date}</span>}
                              {e.note && <span style={{ fontSize: 11, color: '#94a3b8' }}>· {e.note}</span>}
                            </div>
                            <button onClick={() => removeEntry(lt.id, e.id)} style={{ background: 'none', border: 'none', color: '#475569', cursor: 'pointer', fontSize: 16, lineHeight: 1, padding: '0 4px' }}>×</button>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Add entry form */}
                    {isAdding ? (
                      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                        {/* Use / Accrual toggle */}
                        <div style={{ display: 'flex', gap: 6 }}>
                          {[{ val: 'use', label: '− Used / Taken', col: '#f87171' }, { val: 'accrual', label: '+ Accrued', col: '#34d399' }].map(opt => (
                            <button key={opt.val} onClick={() => setEntryType(opt.val)} className="btn"
                              style={{ flex: 1, padding: '7px', fontSize: 12, background: entryType === opt.val ? '#1e293b' : '#0f172a', color: entryType === opt.val ? opt.col : '#475569', border: `1px solid ${entryType === opt.val ? opt.col : '#334155'}` }}>
                              {opt.label}
                            </button>
                          ))}
                        </div>
                        <div style={{ display: 'flex', gap: 8 }}>
                          <input type="date" value={entryDate} onChange={e => setEntryDate(e.target.value)}
                            style={{ ...iStyle, flex: 1 }} />
                          <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                            <input type="number" step="0.25" value={entryHours} onChange={e => setEntryHours(e.target.value)} placeholder="hrs"
                              style={{ ...iStyle, width: 70 }} />
                            <span style={{ color: '#64748b', fontSize: 11 }}>hrs</span>
                          </div>
                        </div>
                        <input value={entryNote} onChange={e => setEntryNote(e.target.value)} placeholder="Note (e.g. Annual leave week 1)"
                          style={{ ...iStyle }} />
                        <div style={{ display: 'flex', gap: 8 }}>
                          <button onClick={() => addEntry(lt.id)} className="btn"
                            style={{ flex: 1, padding: '8px', background: entryType === 'accrual' ? '#052e16' : '#2d0a0a', color: entryType === 'accrual' ? '#34d399' : '#f87171', fontSize: 12, border: `1px solid ${entryType === 'accrual' ? '#16a34a' : '#7f1d1d'}` }}>
                            {entryType === 'accrual' ? '+ Add Accrual' : '− Log Hours Used'}
                          </button>
                          <button onClick={() => { setAddingFor(null); setEntryDate(''); setEntryHours(''); setEntryNote(''); setEntryType('use'); }} className="btn"
                            style={{ padding: '8px 14px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>Cancel</button>
                        </div>
                      </div>
                    ) : (
                      <button onClick={() => { setAddingFor(lt.id); setExpandedId(lt.id); }} className="btn"
                        style={{ width: '100%', padding: '8px', background: '#1e293b', color: lt.color, fontSize: 12, border: `1px dashed ${lt.color}55` }}>
                        + Log Entry
                      </button>
                    )}

                    {/* Balance summary at bottom of expanded */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#1e293b', borderRadius: 8, padding: '8px 12px' }}>
                      <span style={{ fontSize: 12, color: '#64748b' }}>Current balance</span>
                      <span style={{ fontSize: 14, fontWeight: 700, color: balColor }}>{balance >= 0 ? '' : '−'}{Math.abs(balance).toFixed(2)} hrs{base > 0 ? ` · ${formatMoney(Math.abs(balance) * base)}` : ''}</span>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── Long Service Leave Calculator ─────────────────────────────────────────
function LSLCalc({ payRates, holidayState, onClose }) {
  const base = parseFloat(payRates.base) || 0;

  const LSL_RULES = {
    NSW: { minYears: 10, weeksPerYear: 52/60 },
    VIC: { minYears: 7,  weeksPerYear: 52/60 },
    QLD: { minYears: 10, weeksPerYear: 52/60 },
    SA:  { minYears: 10, weeksPerYear: 1.3   },
    WA:  { minYears: 10, weeksPerYear: 52/60 },
    TAS: { minYears: 10, weeksPerYear: 1.3   },
    ACT: { minYears: 7,  weeksPerYear: 52/60 },
    NT:  { minYears: 7,  weeksPerYear: 1.3   },
  };
  const rule = LSL_RULES[holidayState] || LSL_RULES.NSW;

  // All LSL data persisted together
  const [lslData, setLslData] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LSL_KEY)) || {}; } catch { return {}; }
  });
  function saveLsl(d) { setLslData(d); localStorage.setItem(LSL_KEY, JSON.stringify(d)); ENJ_cloudSync(); }

  const startDate    = lslData.startDate    || '';
  const loggedHours  = lslData.loggedHours  || ''; // employer-confirmed available hours
  const usedEntries  = lslData.usedEntries  || []; // [{id, date, hours, note}]

  // Add-entry form state
  const [addingEntry, setAddingEntry]   = useState(false);
  const [entryDate,   setEntryDate]     = useState('');
  const [entryHours,  setEntryHours]    = useState('');
  const [entryNote,   setEntryNote]     = useState('');

  const info = useMemo(() => {
    if (!startDate) return null;
    const [sy, sm, sd] = startDate.split('-').map(Number);
    const start = new Date(sy, sm - 1, sd);
    const today = new Date(); today.setHours(0,0,0,0);
    const years = (today - start) / (1000 * 60 * 60 * 24 * 365.25);
    if (years < 0) return null;
    const weeksAccrued   = years * rule.weeksPerYear;
    const accruedHours   = weeksAccrued * 38;
    const eligible       = years >= rule.minYears;
    const eligibleDate   = new Date(sy + rule.minYears, sm - 1, sd);
    const daysToEligible = eligible ? 0 : Math.ceil((eligibleDate - today) / 86400000);
    const value          = accruedHours * base;
    const eligibleValue  = rule.minYears * rule.weeksPerYear * 38 * base;
    return { years, weeksAccrued, accruedHours, eligible, eligibleDate, daysToEligible, value, eligibleValue };
  }, [startDate, holidayState, base]);

  const totalUsed     = usedEntries.reduce((s, e) => s + (parseFloat(e.hours) || 0), 0);
  const availableHrs  = loggedHours !== '' ? (parseFloat(loggedHours) || 0) : (info ? info.accruedHours : 0);
  const balance       = availableHrs - totalUsed;

  function addEntry() {
    if (!entryHours || parseFloat(entryHours) <= 0) return;
    const entry = { id: Date.now(), date: entryDate, hours: parseFloat(entryHours), note: entryNote };
    saveLsl({ ...lslData, usedEntries: [...usedEntries, entry] });
    setEntryDate(''); setEntryHours(''); setEntryNote(''); setAddingEntry(false);
  }
  function removeEntry(id) { saveLsl({ ...lslData, usedEntries: usedEntries.filter(e => e.id !== id) }); }

  const fmtD = d => d.toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' });

  const inputStyle = { width: '100%', padding: '9px 12px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 13, outline: 'none' };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{ padding: '24px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 17, color: '#f1f5f9' }}>🏆 Long Service Leave</div>
            <div style={{ fontSize: 12, color: '#64748b', marginTop: 2 }}>{holidayState} · min {rule.minYears} yrs · {rule.weeksPerYear.toFixed(2)} wks/yr</div>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#64748b', fontSize: 24, cursor: 'pointer' }}>×</button>
        </div>

        {/* Start date */}
        <div style={{ marginBottom: 14 }}>
          <label style={{ fontSize: 12, color: '#94a3b8', fontWeight: 600, display: 'block', marginBottom: 6 }}>Employment start date</label>
          <input type="date" value={startDate} onChange={e => saveLsl({ ...lslData, startDate: e.target.value })}
            style={{ ...inputStyle }} />
        </div>

        {!base && <div style={{ background: '#1a1a2e', borderRadius: 10, padding: '12px', color: '#64748b', fontSize: 13, marginBottom: 12 }}>Set base hourly rate in ⚙️ Settings to see value estimates.</div>}

        {info && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>

            {/* Service + eligibility */}
            <div style={{ background: '#0f172a', borderRadius: 10, padding: '14px', border: '1px solid #1e3a5f' }}>
              <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase' }}>Service</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                <span style={{ fontSize: 13, color: '#94a3b8' }}>Years of service</span>
                <span style={{ fontSize: 13, color: '#e2e8f0', fontWeight: 600 }}>{info.years.toFixed(1)} yrs</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                <span style={{ fontSize: 13, color: '#94a3b8' }}>Calculated accrual</span>
                <span style={{ fontSize: 13, color: '#60a5fa', fontWeight: 600 }}>{info.weeksAccrued.toFixed(2)} wks · {info.accruedHours.toFixed(1)} hrs</span>
              </div>
              {info.eligible
                ? <div style={{ color: '#34d399', fontWeight: 700, fontSize: 13, marginTop: 4 }}>✅ Eligible for LSL</div>
                : <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
                    <span style={{ fontSize: 13, color: '#94a3b8' }}>Eligible in</span>
                    <span style={{ fontSize: 13, color: '#f59e0b', fontWeight: 600 }}>{info.daysToEligible.toLocaleString()} days ({fmtD(info.eligibleDate)})</span>
                  </div>
              }
            </div>

            {/* Employer logged hours */}
            <div style={{ background: '#0f172a', borderRadius: 10, padding: '14px', border: '1px solid #1e3a5f' }}>
              <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase' }}>Employer Logged Hours (from payslip / HR)</div>
              <div style={{ position: 'relative' }}>
                <input type="number" value={loggedHours} onChange={e => saveLsl({ ...lslData, loggedHours: e.target.value })}
                  placeholder={`Leave blank to use calculated (${info.accruedHours.toFixed(1)} hrs)`}
                  style={{ ...inputStyle, paddingRight: 40 }} />
                <span style={{ position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)', color: '#64748b', fontSize: 12 }}>hrs</span>
              </div>
              <div style={{ fontSize: 11, color: '#475569', marginTop: 6 }}>If set, overrides the calculated figure above as your available balance.</div>
            </div>

            {/* Hours used log */}
            <div style={{ background: '#0f172a', borderRadius: 10, padding: '14px', border: '1px solid #1e3a5f' }}>
              <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, marginBottom: 10, textTransform: 'uppercase' }}>LSL Taken (hours used)</div>

              {usedEntries.length === 0 && !addingEntry && (
                <div style={{ fontSize: 12, color: '#475569', marginBottom: 10 }}>No LSL taken logged yet.</div>
              )}

              {usedEntries.map(e => (
                <div key={e.id} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6, background: '#1e293b', borderRadius: 8, padding: '8px 10px' }}>
                  <div>
                    <span style={{ fontSize: 13, color: '#e2e8f0', fontWeight: 600 }}>−{e.hours} hrs</span>
                    {e.date && <span style={{ fontSize: 12, color: '#64748b', marginLeft: 8 }}>{e.date}</span>}
                    {e.note && <span style={{ fontSize: 12, color: '#94a3b8', marginLeft: 8 }}>· {e.note}</span>}
                  </div>
                  <button onClick={() => removeEntry(e.id)} style={{ background: 'none', border: 'none', color: '#64748b', cursor: 'pointer', fontSize: 18, lineHeight: 1, padding: '0 4px' }}>×</button>
                </div>
              ))}

              {addingEntry ? (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginTop: 8 }}>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <input type="date" value={entryDate} onChange={e => setEntryDate(e.target.value)}
                      style={{ flex: 1, padding: '8px 10px', borderRadius: 8, background: '#1e293b', border: '1px solid #334155', color: '#f1f5f9', fontSize: 12, outline: 'none' }} />
                    <div style={{ position: 'relative', width: 110 }}>
                      <input type="number" value={entryHours} onChange={e => setEntryHours(e.target.value)} placeholder="Hours"
                        style={{ width: '100%', padding: '8px 32px 8px 10px', borderRadius: 8, background: '#1e293b', border: '1px solid #334155', color: '#f1f5f9', fontSize: 12, outline: 'none' }} />
                      <span style={{ position: 'absolute', right: 10, top: '50%', transform: 'translateY(-50%)', color: '#64748b', fontSize: 11 }}>hrs</span>
                    </div>
                  </div>
                  <input value={entryNote} onChange={e => setEntryNote(e.target.value)} placeholder="Note (e.g. LSL approved week 1)"
                    style={{ padding: '8px 10px', borderRadius: 8, background: '#1e293b', border: '1px solid #334155', color: '#f1f5f9', fontSize: 12, outline: 'none' }} />
                  <div style={{ display: 'flex', gap: 8 }}>
                    <button onClick={addEntry} className="btn" style={{ flex: 1, padding: '8px', background: '#3b82f6', color: '#fff', fontSize: 12 }}>Add Entry</button>
                    <button onClick={() => { setAddingEntry(false); setEntryDate(''); setEntryHours(''); setEntryNote(''); }} className="btn" style={{ padding: '8px 14px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>Cancel</button>
                  </div>
                </div>
              ) : (
                <button onClick={() => setAddingEntry(true)} className="btn" style={{ width: '100%', padding: '8px', background: '#1e3a5f', color: '#60a5fa', fontSize: 12, marginTop: 4, border: '1px dashed #1e3a5f' }}>+ Log LSL Taken</button>
              )}
            </div>

            {/* Balance summary */}
            <div style={{ background: balance >= 0 ? '#052e16' : '#2d0a0a', borderRadius: 10, padding: '14px', border: `1px solid ${balance >= 0 ? '#16a34a' : '#7f1d1d'}` }}>
              <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, marginBottom: 10, textTransform: 'uppercase' }}>Balance</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                <span style={{ fontSize: 13, color: '#94a3b8' }}>Available {loggedHours !== '' ? '(employer)' : '(calculated)'}</span>
                <span style={{ fontSize: 13, color: '#60a5fa', fontWeight: 600 }}>{availableHrs.toFixed(1)} hrs</span>
              </div>
              {totalUsed > 0 && (
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                  <span style={{ fontSize: 13, color: '#94a3b8' }}>Total taken</span>
                  <span style={{ fontSize: 13, color: '#f87171', fontWeight: 600 }}>−{totalUsed.toFixed(1)} hrs</span>
                </div>
              )}
              <div style={{ display: 'flex', justifyContent: 'space-between', borderTop: '1px solid #334155', paddingTop: 8, marginTop: 4 }}>
                <span style={{ fontSize: 14, color: '#cbd5e1', fontWeight: 700 }}>Remaining balance</span>
                <span style={{ fontSize: 14, color: balance >= 0 ? '#34d399' : '#f87171', fontWeight: 700 }}>{balance >= 0 ? '' : '−'}{Math.abs(balance).toFixed(1)} hrs</span>
              </div>
              {base > 0 && (
                <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6 }}>
                  <span style={{ fontSize: 12, color: '#64748b' }}>Est. value of balance</span>
                  <span style={{ fontSize: 12, color: '#60a5fa', fontWeight: 600 }}>{formatMoney(balance * base)}</span>
                </div>
              )}
            </div>

            {base > 0 && !info.eligible && (
              <div style={{ background: '#0f172a', borderRadius: 10, padding: '12px', border: '1px solid #1e3a5f' }}>
                <div style={{ fontSize: 12, color: '#64748b', marginBottom: 4 }}>Value at eligibility ({rule.minYears} yrs)</div>
                <div style={{ fontSize: 14, color: '#34d399', fontWeight: 700 }}>{formatMoney(info.eligibleValue)}</div>
              </div>
            )}

            <div style={{ fontSize: 11, color: '#475569', lineHeight: 1.5 }}>
              Estimates only. Based on {holidayState} rules ({rule.minYears} yr min, {rule.weeksPerYear.toFixed(2)} wks/yr). Consult your employer or Fair Work for exact entitlements.
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [allData, setAllData] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  });
  const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
  const [currentMonth, setCurrentMonth] = useState(new Date().getMonth());
  const [modalDay, setModalDay] = useState(null); // {year, month, day}
  const [showTax, setShowTax] = useState(false);
  const [showICS, setShowICS] = useState(false);
  const [showLSL, setShowLSL] = useState(false);
  const [showLeave, setShowLeave] = useState(false);
  const [tooltip, setTooltip] = useState(null); // {data, rect, col}
  const tooltipTimerRef = useRef(null);
  const [lightMode, setLightMode] = useState(() => localStorage.getItem('ENJ_LIGHT') === '1');
  const [showHolidays, setShowHolidays] = useState(() => localStorage.getItem('ENJ_HOLIDAYS') !== '0');
  const [holidayState, setHolidayState] = useState(() => localStorage.getItem('ENJ_HOL_STATE') || 'NSW');
  const [showSettings, setShowSettings] = useState(false);
  const [payRates, setPayRates] = useState(() => {
    try { return JSON.parse(localStorage.getItem(RATES_KEY)) || {}; } catch { return {}; }
  });
  const [dstDismissed, setDstDismissed] = useState(false);
  const [codeReminderDismissed, setCodeReminderDismissed] = useState(() => localStorage.getItem('ENJ_CODE_REMINDER_DISMISSED') === '1');
  const [codeCopiedBanner, setCodeCopiedBanner] = useState(false);
  const myCode = localStorage.getItem('ENJ_MY_CODE');
  function dismissCodeReminder() { localStorage.setItem('ENJ_CODE_REMINDER_DISMISSED', '1'); setCodeReminderDismissed(true); }
  function copyCodeBanner() { navigator.clipboard?.writeText(myCode).then(() => { setCodeCopiedBanner(true); setTimeout(() => setCodeCopiedBanner(false), 2000); }).catch(() => {}); }

  function saveRates(r) {
    setPayRates(r);
    localStorage.setItem(RATES_KEY, JSON.stringify(r));
  }

  // Upcoming pay estimate — uses real pay cycle if configured, else next 14 days
  const upcomingPay = useMemo(() => {
    const agencyMode = !!payRates.agencyMode;
    const agABN      = !!payRates.agABN;
    const agSuper    = parseFloat(payRates.agSuper) || 11.5;

    // Need at least a base rate (standard) OR agency day rate (agency mode)
    const base = parseFloat(payRates.base) || 0;
    if (!agencyMode && !base) return null;
    if (agencyMode && !parseFloat(payRates.agDayRate)) return null;

    const casualPct  = parseFloat(payRates.casualPct) || 0;
    const aftPct     = parseFloat(payRates.aftPct)    || 0;
    const nightPct   = parseFloat(payRates.nightPct)  || 0;
    const satPct     = parseFloat(payRates.satPct)    || 0;
    const sunPct     = parseFloat(payRates.sunPct)    || 0;
    const phPct      = parseFloat(payRates.phPct)     || 0;
    const casualBase = base * (1 + casualPct / 100);
    const otX1       = parseFloat(payRates.otX1)      || 1.5;
    const otX2       = parseFloat(payRates.otX2)      || 2.0;
    const inchargeAmt  = parseFloat(payRates.incharge)   || 0;
    const qualsRate    = parseFloat(payRates.quals)       || 0;
    const oncallRate   = parseFloat(payRates.oncallRate)  || 0;
    const mealAllow    = parseFloat(payRates.mealAllow)   || 0;
    const shiftAllow   = parseFloat(payRates.shiftAllow)  || 0;
    const uniformAllow = parseFloat(payRates.uniformAllow)|| 0;
    const holidays = getHolidays(holidayState);

    // Determine date range — real cycle or fallback 14 days
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    let rangeStart, rangeEnd, payDay = null, usingCycle = false;

    if (payRates.anchorPayDate && payRates.anchorPeriodStart) {
      try {
        const [apy, apm, apd] = payRates.anchorPayDate.split('-').map(Number);
        const [spy, spm, spd] = payRates.anchorPeriodStart.split('-').map(Number);
        const anchorPay   = new Date(apy, apm - 1, apd);
        const anchorStart = new Date(spy, spm - 1, spd);
        const offsetDays  = Math.round((anchorStart - anchorPay) / 86400000);
        const diffDays = Math.round((today - anchorPay) / 86400000);
        let fn = Math.ceil(diffDays / 14);
        if (fn < 0) fn = 0;
        let nextPay = new Date(apy, apm - 1, apd + fn * 14);
        while (nextPay <= today) nextPay = new Date(nextPay.getFullYear(), nextPay.getMonth(), nextPay.getDate() + 14);
        payDay = nextPay;
        rangeStart = new Date(nextPay.getFullYear(), nextPay.getMonth(), nextPay.getDate() + offsetDays);
        rangeEnd   = new Date(rangeStart.getFullYear(), rangeStart.getMonth(), rangeStart.getDate() + 13);
        usingCycle = true;
      } catch(e) { /* fall through */ }
    }

    if (!usingCycle) {
      rangeStart = new Date(today);
      rangeEnd   = new Date(today.getFullYear(), today.getMonth(), today.getDate() + 13);
    }

    // Sum shifts in range
    let gross = 0;
    let totalWorkedHours = 0; // for uniform/laundry cap
    for (let i = 0; i <= 13; i++) {
      const d = new Date(rangeStart.getFullYear(), rangeStart.getMonth(), rangeStart.getDate() + i);
      const y = d.getFullYear(), mo = d.getMonth(), day = d.getDate();
      const dk = dateKey(y, mo, day);
      const data = allData[dk];
      if (!data?.shiftType || ['rdo','leave','off','sick'].includes(data.shiftType)) continue;
      const otHrs   = data.otChip && data.otChip !== 'None' ? parseDurChip(data.otChip) : 0;
      const regHrs  = parseFloat(data.duration) || 8.5;
      const totalHrs = regHrs + otHrs;
      const dow     = d.getDay();
      const hKey    = holidayKey(y, mo + 1, day);
      const isHol   = showHolidays && !!holidays[hKey];

      let shiftPay = 0;

      // ── ADO — paid at ordinary rate (no shift loading) ────────────
      if (data.shiftType === 'ado') {
        shiftPay = agencyMode
          ? (parseFloat(payRates.agDayRate) || 0) * regHrs
          : casualBase * regHrs;

      // ── On-call (standby) ──────────────────────────────────────────
      } else if (data.shiftType === 'oncall') {
        const rate = agencyMode ? (parseFloat(payRates.agOncallRate) || 0) : oncallRate;
        shiftPay = rate * regHrs;

      // ── Agency mode — flat rates ───────────────────────────────────
      } else if (agencyMode) {
        let flatRate = 0;
        if (isHol)                              flatRate = parseFloat(payRates.agPHRate)    || 0;
        else if (dow === 0)                     flatRate = parseFloat(payRates.agSunRate)   || 0;
        else if (dow === 6)                     flatRate = parseFloat(payRates.agSatRate)   || 0;
        else if (data.shiftType === 'night')    flatRate = parseFloat(payRates.agNightRate) || 0;
        else if (data.shiftType === 'evening')  flatRate = parseFloat(payRates.agEveRate)   || 0;
        else                                    flatRate = parseFloat(payRates.agDayRate)   || 0;
        shiftPay = flatRate * regHrs;

      // ── Standard — base + loadings ────────────────────────────────
      } else {
        let pct = 0;
        if (isHol)                              pct = phPct;
        else if (dow === 0)                     pct = sunPct;
        else if (dow === 6)                     pct = satPct;
        else if (data.shiftType === 'night')    pct = nightPct;
        else if (data.shiftType === 'evening')  pct = aftPct;
        const effectiveRate = casualBase * (1 + pct / 100);
        if (data.shiftType === 'overtime') {
          shiftPay = effectiveRate * otX1 * regHrs;
        } else {
          shiftPay = effectiveRate * regHrs;
          if (otHrs > 0) {
            shiftPay += casualBase * otX1 * Math.min(otHrs, 1);
            if (otHrs > 1) shiftPay += casualBase * otX2 * (otHrs - 1);
          }
        }
        if (data.inCharge && inchargeAmt) shiftPay += inchargeAmt;
        if (qualsRate) shiftPay += qualsRate * totalHrs;
      }

      // Shift-level allowances (both modes)
      if (shiftAllow) shiftPay += shiftAllow;
      if (mealAllow && otHrs > 0) shiftPay += mealAllow;

      gross += shiftPay;
      totalWorkedHours += totalHrs;
    }

    // Uniform/laundry — $/hr rate capped at 80 hrs per fortnight
    if (uniformAllow) gross += uniformAllow * Math.min(totalWorkedHours, 80);

    const fmtD = d => d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });
    const periodLabel = `${fmtD(rangeStart)} – ${fmtD(rangeEnd)}`;
    const payDayLabel = payDay ? fmtD(payDay) : null;

    if (gross === 0) return { gross: 0, net: 0, tax: 0, superAmt: 0, noShifts: true, periodLabel, payDayLabel, usingCycle, agencyMode, agABN, agSuper };

    // Tax
    let fortnightTax = 0;
    if (!agABN) {
      const annualGross = gross * 26;
      const tr = calcTax(annualGross, { residency: 'resident', tfThreshold: true, helpDebt: false });
      fortnightTax = tr.totalTax / 26;
    }

    // Super (agency mode shows separately)
    const superAmt = agencyMode ? gross * agSuper / 100 : 0;

    return { gross, tax: fortnightTax, net: gross - fortnightTax, superAmt, noShifts: false, periodLabel, payDayLabel, usingCycle, agencyMode, agABN, agSuper };
  }, [allData, payRates, showHolidays, holidayState]);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
  }, [allData]);

  // Auto-sync ALL data to Supabase on shift changes (debounced 4s)
  useEffect(() => {
    if (!localStorage.getItem('ENJ_SYNC_TOKEN')) return;
    const timer = setTimeout(() => ENJ_cloudSync(), 4000);
    return () => clearTimeout(timer);
  }, [allData]);

  // Also sync when pay rates change (debounced 3s)
  useEffect(() => {
    if (!localStorage.getItem('ENJ_SYNC_TOKEN')) return;
    const timer = setTimeout(() => ENJ_cloudSync(), 3000);
    return () => clearTimeout(timer);
  }, [payRates]);

  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1);
  // Mon = 0 ... Sun = 6
  let startDow = (firstDay.getDay() + 6) % 7; // Mon-based
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  function prevMonth() {
    if (currentMonth === 0) { setCurrentYear(y => y - 1); setCurrentMonth(11); }
    else setCurrentMonth(m => m - 1);
  }
  function nextMonth() {
    if (currentMonth === 11) { setCurrentYear(y => y + 1); setCurrentMonth(0); }
    else setCurrentMonth(m => m + 1);
  }
  function goToday() {
    setCurrentYear(today.getFullYear());
    setCurrentMonth(today.getMonth());
  }

  // Monthly stats
  const monthStats = useMemo(() => {
    const counts = {};
    SHIFT_TYPES.forEach(s => counts[s.id] = 0);
    let totalPay = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const dk = dateKey(currentYear, currentMonth, d);
      const data = allData[dk];
      if (data?.shiftType) counts[data.shiftType] = (counts[data.shiftType] || 0) + 1;
      if (data?.isPayday && data?.payAmount) totalPay += parseFloat(data.payAmount) || 0;
    }
    return { counts, totalPay };
  }, [allData, currentYear, currentMonth, daysInMonth]);

  function backup() {
    const payload = {
      _version: 2,
      shifts:      allData,
      rates:       JSON.parse(localStorage.getItem(RATES_KEY)  || 'null'),
      lsl:         JSON.parse(localStorage.getItem(LSL_KEY)    || 'null'),
      leave:       JSON.parse(localStorage.getItem(LEAVE_KEY)  || 'null'),
      taxSettings: JSON.parse(localStorage.getItem(TAX_KEY)    || 'null'),
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `nurse-shift-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  }

  function load() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          // Support both v1 (raw shift object) and v2 (full payload)
          if (parsed._version === 2) {
            if (parsed.shifts)      { setAllData(parsed.shifts); localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed.shifts)); }
            if (parsed.rates)       localStorage.setItem(RATES_KEY, JSON.stringify(parsed.rates));
            if (parsed.lsl)         localStorage.setItem(LSL_KEY,   JSON.stringify(parsed.lsl));
            if (parsed.leave)       localStorage.setItem(LEAVE_KEY, JSON.stringify(parsed.leave));
            if (parsed.taxSettings) localStorage.setItem(TAX_KEY,   JSON.stringify(parsed.taxSettings));
            alert('✅ All data restored — pay rates, leave balances, LSL, and shifts. Refreshing…');
            setTimeout(() => window.location.reload(), 800);
          } else {
            // Legacy v1 — just shift data
            setAllData(parsed);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
            alert('✅ Shifts restored. Note: pay rates and leave balances were not included in this backup file.');
          }
        } catch { alert('Invalid backup file — please use a file exported from this app.'); }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  const monthName = new Date(currentYear, currentMonth, 1).toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });

  const dstAlert = getDSTAlert(holidayState);

  return (
    <div className={lightMode ? 'light-mode' : ''} style={{ minHeight: '100vh', background: '#0f172a', fontFamily: 'Inter, sans-serif' }}>
      {/* DST Banner */}
      {dstAlert && !dstDismissed && (
        <div style={{
          background: dstAlert.type === 'forward' ? 'linear-gradient(90deg,#92400e,#b45309)' : 'linear-gradient(90deg,#1e3a5f,#1d4ed8)',
          padding: '10px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <span style={{ fontSize: 20 }}>{dstAlert.type === 'forward' ? '⏰' : '🕰️'}</span>
            <div>
              <div style={{ fontWeight: 700, fontSize: 13, color: '#fff' }}>
                Daylight Saving {dstAlert.type === 'forward' ? 'Starts' : 'Ends'} Tonight — {holidayState}
              </div>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.8)', marginTop: 2 }}>{dstAlert.msg}</div>
            </div>
          </div>
          <button onClick={() => setDstDismissed(true)} style={{ background: 'rgba(255,255,255,0.15)', border: 'none', color: '#fff', borderRadius: 6, padding: '4px 10px', fontSize: 12, cursor: 'pointer', fontWeight: 600, whiteSpace: 'nowrap' }}>Got it ✓</button>
        </div>
      )}
      {/* Save Your Code Reminder Banner */}
      {myCode && !codeReminderDismissed && (
        <div style={{ background: 'linear-gradient(90deg,#1e3a5f,#1e40af)', padding: '10px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, flex: 1 }}>
            <span style={{ fontSize: 20, flexShrink: 0 }}>📋</span>
            <div>
              <div style={{ fontWeight: 700, fontSize: 13, color: '#fff' }}>Save your Ko-fi code — you'll need it on new devices</div>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.8)', marginTop: 2, display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                <span style={{ fontFamily: 'monospace', fontWeight: 700, letterSpacing: 2, background: 'rgba(0,0,0,0.3)', padding: '2px 8px', borderRadius: 4 }}>{myCode}</span>
                <button onClick={copyCodeBanner} style={{ background: codeCopiedBanner ? '#16a34a' : 'rgba(255,255,255,0.2)', border: 'none', color: '#fff', borderRadius: 4, padding: '2px 8px', fontSize: 11, cursor: 'pointer', fontWeight: 600 }}>
                  {codeCopiedBanner ? '✓ Copied!' : 'Copy'}
                </button>
                <span style={{ color: 'rgba(255,255,255,0.6)' }}>Screenshot or save to Notes</span>
              </div>
            </div>
          </div>
          <button onClick={dismissCodeReminder} style={{ background: 'rgba(255,255,255,0.15)', border: 'none', color: '#fff', borderRadius: 6, padding: '4px 10px', fontSize: 12, cursor: 'pointer', fontWeight: 600, whiteSpace: 'nowrap', flexShrink: 0 }}>Got it ✓</button>
        </div>
      )}
      {/* Header */}
      <div style={{ background: '#1e293b', borderBottom: '1px solid #334155', padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
        <div style={{ flex: '0 0 auto', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 20 }}>🏥</span>
          <span style={{ fontWeight: 800, fontSize: 16, color: '#f1f5f9' }}>Nurse Shift Planner</span>
          <span style={{ fontSize: 11, color: '#16a34a', background: '#052e16', borderRadius: 4, padding: '2px 6px', fontWeight: 700 }}>v5 ✓</span>
        </div>
        <div style={{ flex: 1 }}></div>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          <button onClick={() => { const n = !lightMode; setLightMode(n); localStorage.setItem('ENJ_LIGHT', n ? '1' : '0'); }} className="btn" style={{ padding: '7px 12px', background: lightMode ? '#1e3a5f' : '#334155', color: lightMode ? '#60a5fa' : '#94a3b8', fontSize: 12 }}>{lightMode ? '🌙 Dark' : '☀️ Bright'}</button>
          <button onClick={() => setShowSettings(s => !s)} className="btn" style={{ padding: '7px 12px', background: showSettings ? '#1e3a5f' : '#334155', color: showSettings ? '#60a5fa' : '#94a3b8', fontSize: 12 }}>⚙️ Settings</button>
          <button onClick={() => setShowTax(true)} className="btn" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>🧮 Tax Calc</button>
          <button onClick={() => setShowLSL(true)} className="btn" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>🏆 LSL</button>
          <button onClick={() => setShowLeave(true)} className="btn" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>📋 Leave</button>
          <button onClick={() => setShowICS(true)} className="btn" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>📆 Sync Calendar</button>
          <button onClick={backup} className="btn" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>💾 Backup</button>
          <button onClick={load} className="btn" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>📂 Load</button>
          <a href="community.html" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12, borderRadius: 8, textDecoration: 'none', fontWeight: 600 }}>👥 Community</a>
        </div>
      </div>

      {/* Calendar nav + stats */}
      <div style={{ padding: '16px 16px 8px', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
        <button onClick={prevMonth} className="btn" style={{ padding: '8px 14px', background: '#334155', color: '#e2e8f0', fontSize: 16 }}>‹</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 20, color: '#f1f5f9' }}>{monthName}</div>
          {/* Stats */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 6 }}>
            {SHIFT_TYPES.filter(s => monthStats.counts[s.id] > 0).map(s => (
              <span key={s.id} style={{ fontSize: 12, color: s.color, background: s.color + '22', borderRadius: 5, padding: '2px 7px', fontWeight: 600 }}>
                {s.emoji} {s.label}: {monthStats.counts[s.id]}
              </span>
            ))}
            {monthStats.totalPay > 0 && (
              <span style={{ fontSize: 12, color: '#fbbf24', background: '#fbbf2422', borderRadius: 5, padding: '2px 7px', fontWeight: 600 }}>
                💰 {formatMoney(monthStats.totalPay)}
              </span>
            )}
          </div>
        </div>
        <button onClick={goToday} className="btn" style={{ padding: '8px 14px', background: '#334155', color: '#94a3b8', fontSize: 13 }}>Today</button>
        <button onClick={nextMonth} className="btn" style={{ padding: '8px 14px', background: '#334155', color: '#e2e8f0', fontSize: 16 }}>›</button>
      </div>

      {/* Day headers */}
      <div style={{ padding: '0 16px', display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, marginBottom: 4 }}>
        {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d, i) => (
          <div key={d} style={{ textAlign: 'center', fontSize: 12, fontWeight: 600, color: i >= 5 ? '#475569' : '#64748b', padding: '4px 0' }}>{d}</div>
        ))}
      </div>

      {/* Grid */}
      <div style={{ padding: '0 16px 24px', display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, overflowX: 'hidden', minWidth: 0 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={`empty-${i}`}></div>;
          const dk = dateKey(currentYear, currentMonth, day);
          const cellDate = new Date(currentYear, currentMonth, day);
          const isToday = isSameDay(cellDate, today);
          const dow = (cellDate.getDay() + 6) % 7;
          const isWeekend = dow >= 5;
          const colIndex = i % 7;
          return (
            <CalCell
              key={dk}
              year={currentYear} month={currentMonth} day={day}
              data={allData[dk]}
              isToday={isToday}
              isWeekend={isWeekend}
              holiday={showHolidays ? (getHolidays(holidayState)[holidayKey(currentYear, currentMonth + 1, day)] || null) : null}
              onOpen={(y, m, d) => setModalDay({ year: y, month: m, day: d })}
              onTooltip={(e, data, rect) => setTooltip({ data, rect, col: colIndex })}
              onTooltipHide={() => setTooltip(null)}
            />
          );
        })}
      </div>

      {/* Shift type legend */}
      <div style={{ padding: '0 16px 24px', display: 'flex', flexWrap: 'wrap', gap: 8 }}>
        {SHIFT_TYPES.map(s => (
          <span key={s.id} style={{ fontSize: 12, color: s.color, display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: s.color, display: 'inline-block' }}></span>
            {s.emoji} {s.label}
          </span>
        ))}
      </div>

      {/* Tooltip */}
      {tooltip && <Tooltip data={tooltip.data} rect={tooltip.rect} colIndex={tooltip.col} />}

      {/* Shift Modal */}
      {modalDay && (
        <ShiftModal
          dateStr={dateKey(modalDay.year, modalDay.month, modalDay.day)}
          data={allData[dateKey(modalDay.year, modalDay.month, modalDay.day)]}
          allData={allData}
          onSave={newData => { setAllData(newData); setModalDay(null); }}
          onClose={() => setModalDay(null)}
          agencyMode={!!payRates.agencyMode}
        />
      )}

      {/* Settings panel */}
      {showSettings && (
        <div style={{ position: 'fixed', top: 56, right: 12, left: 12, zIndex: 500, background: '#1e293b', border: '1px solid #334155', borderRadius: 12, boxShadow: '0 8px 32px rgba(0,0,0,0.5)', display: 'flex', flexDirection: 'column', maxHeight: 'calc(100vh - 72px)' }}>
          {/* Sticky header */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 18px 10px', borderBottom: '1px solid #334155', flexShrink: 0 }}>
            <div style={{ fontWeight: 700, fontSize: 14, color: '#f1f5f9' }}>⚙️ Settings</div>
            <button onClick={() => setShowSettings(false)} style={{ background: '#0f172a', border: '1px solid #334155', color: '#94a3b8', borderRadius: 8, width: 32, height: 32, fontSize: 18, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', lineHeight: 1 }}>×</button>
          </div>
          {/* Scrollable body */}
          <div style={{ overflowY: 'auto', padding: '14px 18px 18px', flex: 1 }}>

          {/* Auto-save + backup notice */}
          <div style={{ background: '#0c2340', border: '1px solid #1e40af', borderRadius: 10, padding: '11px 14px', marginBottom: 16, display: 'flex', gap: 10, alignItems: 'flex-start' }}>
            <div style={{ fontSize: 18, lineHeight: 1, flexShrink: 0 }}>💾</div>
            <div>
              <div style={{ fontSize: 13, fontWeight: 700, color: '#60a5fa', marginBottom: 4 }}>Auto-save is on — no manual saves needed</div>
              <div style={{ fontSize: 12, color: '#93c5fd', lineHeight: 1.5 }}>
                All your shifts, pay rates, leave balances and LSL data save automatically to this device as you go.
              </div>
              <div style={{ fontSize: 12, color: '#93c5fd', marginTop: 6, lineHeight: 1.5 }}>
                <strong style={{ color: '#60a5fa' }}>Switching phones or browsers?</strong> Use <strong style={{ color: '#60a5fa' }}>💾 Backup</strong> (top bar) to export a file and <strong style={{ color: '#60a5fa' }}>📂 Load</strong> to restore it. Your Ko-fi code + PIN re-unlocks the app, but your data needs the backup file.
              </div>
            </div>
          </div>

          {/* Holidays toggle */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
              <div style={{ fontSize: 13, color: '#cbd5e1', fontWeight: 600 }}>🎉 Public Holidays</div>
              <button
                onClick={() => { const n = !showHolidays; setShowHolidays(n); localStorage.setItem('ENJ_HOLIDAYS', n ? '1' : '0'); }}
                style={{
                  width: 40, height: 22, borderRadius: 11, border: 'none', cursor: 'pointer',
                  background: showHolidays ? '#3b82f6' : '#334155',
                  position: 'relative', transition: 'background 0.2s',
                }}
              >
                <div style={{
                  position: 'absolute', top: 3, left: showHolidays ? 21 : 3,
                  width: 16, height: 16, background: '#fff', borderRadius: '50%',
                  transition: 'left 0.2s',
                }}></div>
              </button>
            </div>
            {showHolidays && (
              <div>
                <div style={{ fontSize: 11, color: '#64748b', marginBottom: 6 }}>Show holidays for state:</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                  {['NSW','VIC','QLD','SA','WA','TAS','ACT','NT'].map(st => (
                    <button key={st} onClick={() => { setHolidayState(st); localStorage.setItem('ENJ_HOL_STATE', st); }}
                      style={{
                        padding: '4px 10px', borderRadius: 6, border: 'none', cursor: 'pointer',
                        background: holidayState === st ? '#3b82f6' : '#0f172a',
                        color: holidayState === st ? '#fff' : '#64748b',
                        fontSize: 12, fontWeight: 600,
                      }}>{st}</button>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Pay Rates */}
          <div style={{ borderTop: '1px solid #334155', paddingTop: 14, marginTop: 4, marginBottom: 14 }}>
            <div style={{ fontSize: 13, color: '#cbd5e1', fontWeight: 600, marginBottom: 10 }}>💰 Pay Calculator</div>

            {/* Base rate */}
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
              <div style={{ fontSize: 12, color: '#f1f5f9', fontWeight: 600 }}>Base hourly rate</div>
              <div style={{ position: 'relative' }}>
                <span style={{ position: 'absolute', left: 8, top: '50%', transform: 'translateY(-50%)', color: '#64748b', fontSize: 12 }}>$</span>
                <input type="number" value={payRates.base || ''} onChange={e => saveRates({ ...payRates, base: e.target.value })}
                  placeholder="e.g. 45.00"
                  style={{ width: 90, padding: '5px 6px 5px 18px', borderRadius: 6, background: '#0f172a', border: '1px solid #3b82f6', color: '#e2e8f0', fontSize: 12, outline: 'none' }} />
              </div>
            </div>

            {/* Shift loadings */}
            <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.5 }}>Shift Loadings (% on top of base)</div>
            {[
              { key: 'casualPct', label: 'Casual loading',       placeholder: 'e.g. 25' },
              { key: 'aftPct',    label: 'Afternoon / Evening',  placeholder: 'e.g. 15' },
              { key: 'nightPct',  label: 'Night shift',          placeholder: 'e.g. 15' },
              { key: 'satPct',    label: 'Saturday',             placeholder: 'e.g. 50' },
              { key: 'sunPct',    label: 'Sunday',               placeholder: 'e.g. 75' },
              { key: 'phPct',     label: 'Public holiday',       placeholder: 'e.g. 150' },
            ].map(({ key, label, placeholder }) => (
              <div key={key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                <div style={{ fontSize: 12, color: '#94a3b8', flex: 1 }}>{label}</div>
                <div style={{ position: 'relative' }}>
                  <input type="number" value={payRates[key] || ''} onChange={e => saveRates({ ...payRates, [key]: e.target.value })}
                    placeholder={placeholder}
                    style={{ width: 72, padding: '5px 22px 5px 8px', borderRadius: 6, background: '#0f172a', border: '1px solid #334155', color: '#e2e8f0', fontSize: 12, outline: 'none' }} />
                  <span style={{ position: 'absolute', right: 8, top: '50%', transform: 'translateY(-50%)', color: '#64748b', fontSize: 12 }}>%</span>
                </div>
              </div>
            ))}

            {/* OT multipliers */}
            <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, margin: '10px 0 6px', textTransform: 'uppercase', letterSpacing: 0.5 }}>Overtime (× base rate)</div>
            {[
              { key: 'otX1', label: 'First OT hour',      placeholder: '1.5' },
              { key: 'otX2', label: 'Additional OT hours', placeholder: '2.0' },
            ].map(({ key, label, placeholder }) => (
              <div key={key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                <div style={{ fontSize: 12, color: '#94a3b8', flex: 1 }}>{label}</div>
                <div style={{ position: 'relative' }}>
                  <span style={{ position: 'absolute', left: 8, top: '50%', transform: 'translateY(-50%)', color: '#64748b', fontSize: 12 }}>×</span>
                  <input type="number" step="0.25" value={payRates[key] || ''} onChange={e => saveRates({ ...payRates, [key]: e.target.value })}
                    placeholder={placeholder}
                    style={{ width: 72, padding: '5px 8px 5px 20px', borderRadius: 6, background: '#0f172a', border: '1px solid #334155', color: '#e2e8f0', fontSize: 12, outline: 'none' }} />
                </div>
              </div>
            ))}

            {/* Allowances */}
            <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, margin: '10px 0 6px', textTransform: 'uppercase', letterSpacing: 0.5 }}>Allowances</div>
            {[
              { key: 'incharge', label: '👑 In Charge (per shift)', prefix: '$', placeholder: 'e.g. 28.50' },
              { key: 'quals',    label: '🎓 Qualifications (per hr)', prefix: '$', placeholder: 'e.g. 1.50'  },
            ].map(({ key, label, prefix, placeholder }) => (
              <div key={key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                <div style={{ fontSize: 12, color: '#94a3b8', flex: 1 }}>{label}</div>
                <div style={{ position: 'relative' }}>
                  <span style={{ position: 'absolute', left: 8, top: '50%', transform: 'translateY(-50%)', color: '#64748b', fontSize: 12 }}>{prefix}</span>
                  <input type="number" value={payRates[key] || ''} onChange={e => saveRates({ ...payRates, [key]: e.target.value })}
                    placeholder={placeholder}
                    style={{ width: 90, padding: '5px 6px 5px 18px', borderRadius: 6, background: '#0f172a', border: '1px solid #334155', color: '#e2e8f0', fontSize: 12, outline: 'none' }} />
                </div>
              </div>
            ))}

            {/* On-call & extras */}
            <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, margin: '10px 0 6px', textTransform: 'uppercase', letterSpacing: 0.5 }}>On-Call & Extras</div>
            {[
              { key: 'oncallRate',  label: '📟 On-call standby rate', suffix: '/hr',  prefix: '$', placeholder: 'e.g. 12.00', step: '0.01' },
              { key: 'callbackMin', label: '⏱ Call-back minimum hrs', suffix: 'hrs', prefix: '',  placeholder: '3',           step: '0.5'  },
              { key: 'callbackX',   label: '↩ Call-back multiplier',  suffix: '×',   prefix: '',  placeholder: '1.5',          step: '0.25' },
              { key: 'mealAllow',   label: '🍽 Meal allowance (OT shift)', suffix: '/shift', prefix: '$', placeholder: 'e.g. 18.00', step: '0.01' },
              { key: 'shiftAllow',  label: '📋 Shift flat allowance', suffix: '/shift', prefix: '$', placeholder: 'e.g. 5.00',  step: '0.01' },
              { key: 'uniformAllow',label: '👕 Uniform/laundry',      suffix: '/hr ≤80', prefix: '$', placeholder: 'e.g. 0.15',  step: '0.01' },
            ].map(({ key, label, suffix, prefix, placeholder, step }) => (
              <div key={key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                <div style={{ fontSize: 12, color: '#94a3b8', flex: 1 }}>{label}</div>
                <div style={{ position: 'relative', display: 'flex', alignItems: 'center', gap: 4 }}>
                  {prefix && <span style={{ color: '#64748b', fontSize: 12 }}>{prefix}</span>}
                  <input type="number" step={step} value={payRates[key] || ''} onChange={e => saveRates({ ...payRates, [key]: e.target.value })}
                    placeholder={placeholder}
                    style={{ width: 72, padding: '5px 8px', borderRadius: 6, background: '#0f172a', border: '1px solid #334155', color: '#e2e8f0', fontSize: 12, outline: 'none' }} />
                  <span style={{ color: '#64748b', fontSize: 11, whiteSpace: 'nowrap' }}>{suffix}</span>
                </div>
              </div>
            ))}

            {/* Pay cycle anchor */}
            <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, margin: '10px 0 6px', textTransform: 'uppercase', letterSpacing: 0.5 }}>📅 Pay Cycle (optional)</div>
            <div style={{ fontSize: 11, color: '#475569', marginBottom: 8, lineHeight: 1.5 }}>Enter a known pay date and the start of that pay period so the estimate uses your exact fortnightly cycle.</div>
            {[
              { key: 'anchorPayDate',    label: 'A known pay day' },
              { key: 'anchorPeriodStart', label: 'Period start for that pay' },
            ].map(({ key, label }) => (
              <div key={key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                <div style={{ fontSize: 12, color: '#94a3b8', flex: 1 }}>{label}</div>
                <input type="date" value={payRates[key] || ''} onChange={e => saveRates({ ...payRates, [key]: e.target.value })}
                  style={{ padding: '4px 6px', borderRadius: 6, background: '#0f172a', border: '1px solid #334155', color: '#e2e8f0', fontSize: 12, outline: 'none', width: 128 }} />
              </div>
            ))}

            {/* Pay estimate */}
            {upcomingPay && (
              <div style={{ background: '#0f172a', borderRadius: 10, padding: '10px 12px', marginTop: 10, border: '1px solid #1e3a5f' }}>
                <div style={{ fontSize: 11, color: '#64748b', marginBottom: 2, fontWeight: 600 }}>
                  {upcomingPay.usingCycle ? '📅 UPCOMING PAY PERIOD' : '📅 NEXT 14 DAYS ESTIMATE'}
                </div>
                {upcomingPay.usingCycle && (
                  <div style={{ marginBottom: 7 }}>
                    <div style={{ fontSize: 12, color: '#60a5fa', fontWeight: 600 }}>{upcomingPay.periodLabel}</div>
                    {upcomingPay.payDayLabel && <div style={{ fontSize: 11, color: '#64748b' }}>Pay day: {upcomingPay.payDayLabel}</div>}
                  </div>
                )}
                {!upcomingPay.usingCycle && <div style={{ marginBottom: 7 }}><div style={{ fontSize: 12, color: '#60a5fa' }}>{upcomingPay.periodLabel}</div></div>}
                {upcomingPay.noShifts ? (
                  <div style={{ fontSize: 12, color: '#475569' }}>No shifts logged for this period</div>
                ) : (
                  <>
                    {upcomingPay.agencyMode && (
                      <div style={{ fontSize: 11, color: '#0891b2', fontWeight: 600, marginBottom: 6 }}>🏢 Agency Mode{upcomingPay.agABN ? ' · ABN Contractor' : ''}</div>
                    )}
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                      <span style={{ fontSize: 12, color: '#94a3b8' }}>Gross pay</span>
                      <span style={{ fontSize: 12, color: '#e2e8f0', fontWeight: 600 }}>{formatMoney(upcomingPay.gross)}</span>
                    </div>
                    {upcomingPay.agencyMode && upcomingPay.superAmt > 0 && (
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                        <span style={{ fontSize: 12, color: '#94a3b8' }}>Super ({upcomingPay.agSuper}%)</span>
                        <span style={{ fontSize: 12, color: '#60a5fa' }}>+{formatMoney(upcomingPay.superAmt)}</span>
                      </div>
                    )}
                    {!upcomingPay.agABN && (
                      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                        <span style={{ fontSize: 12, color: '#94a3b8' }}>Est. tax withheld</span>
                        <span style={{ fontSize: 12, color: '#f87171' }}>−{formatMoney(upcomingPay.tax)}</span>
                      </div>
                    )}
                    <div style={{ display: 'flex', justifyContent: 'space-between', borderTop: '1px solid #1e3a5f', paddingTop: 6, marginTop: 2 }}>
                      <span style={{ fontSize: 13, color: '#cbd5e1', fontWeight: 700 }}>Take-home</span>
                      <span style={{ fontSize: 13, color: '#34d399', fontWeight: 700 }}>{formatMoney(upcomingPay.net)}</span>
                    </div>
                    {upcomingPay.agABN
                      ? <div style={{ fontSize: 10, color: '#f59e0b', marginTop: 6 }}>ABN mode: no tax withheld. Set aside approx 30–47% for your own tax obligations.</div>
                      : <div style={{ fontSize: 10, color: '#475569', marginTop: 6 }}>Resident tax, tax-free threshold on. Open 🧮 Tax Calc for full breakdown.</div>
                    }
                  </>
                )}
              </div>
            )}
            {!upcomingPay && (
              <div style={{ fontSize: 11, color: '#475569', marginTop: 6 }}>Enter your base rate above to see a pay estimate.</div>
            )}
          </div>

          {/* Agency Nurse Mode */}
          <div style={{ borderTop: '1px solid #334155', paddingTop: 14, marginTop: 4, marginBottom: 14 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
              <div>
                <div style={{ fontSize: 13, color: '#cbd5e1', fontWeight: 600 }}>🏢 Agency Nurse Mode</div>
                <div style={{ fontSize: 11, color: '#475569', marginTop: 2 }}>Use flat hourly rates instead of base + loadings</div>
              </div>
              <button
                onClick={() => saveRates({ ...payRates, agencyMode: !payRates.agencyMode })}
                style={{ width: 40, height: 22, borderRadius: 11, border: 'none', cursor: 'pointer', background: payRates.agencyMode ? '#0891b2' : '#334155', position: 'relative', transition: 'background 0.2s', flexShrink: 0 }}
              >
                <div style={{ position: 'absolute', top: 3, left: payRates.agencyMode ? 21 : 3, width: 16, height: 16, background: '#fff', borderRadius: '50%', transition: 'left 0.2s' }}></div>
              </button>
            </div>

            {payRates.agencyMode && (
              <div style={{ marginTop: 10 }}>
                {/* Flat rates per shift type */}
                <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.5 }}>Flat Rates ($/hr incl. all loadings)</div>
                {[
                  { key: 'agDayRate',    label: '🌅 Day'        },
                  { key: 'agEveRate',    label: '🌆 Evening'    },
                  { key: 'agNightRate',  label: '🌙 Night'      },
                  { key: 'agSatRate',    label: '🗓 Saturday'   },
                  { key: 'agSunRate',    label: '☀️ Sunday'     },
                  { key: 'agPHRate',     label: '🎉 Public Hol' },
                  { key: 'agOncallRate', label: '📟 On-Call'    },
                ].map(({ key, label }) => (
                  <div key={key} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                    <div style={{ fontSize: 12, color: '#94a3b8', flex: 1 }}>{label}</div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                      <span style={{ color: '#64748b', fontSize: 12 }}>$</span>
                      <input type="number" step="0.01" value={payRates[key] || ''} onChange={e => saveRates({ ...payRates, [key]: e.target.value })}
                        placeholder="0.00"
                        style={{ width: 72, padding: '5px 8px', borderRadius: 6, background: '#0f172a', border: '1px solid #0891b2', color: '#e2e8f0', fontSize: 12, outline: 'none' }} />
                      <span style={{ color: '#64748b', fontSize: 11 }}>/hr</span>
                    </div>
                  </div>
                ))}

                {/* Super */}
                <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, margin: '10px 0 6px', textTransform: 'uppercase', letterSpacing: 0.5 }}>Superannuation</div>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                  <div style={{ fontSize: 12, color: '#94a3b8', flex: 1 }}>Super rate</div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                    <input type="number" step="0.1" value={payRates.agSuper || ''} onChange={e => saveRates({ ...payRates, agSuper: e.target.value })}
                      placeholder="11.5"
                      style={{ width: 60, padding: '5px 8px', borderRadius: 6, background: '#0f172a', border: '1px solid #334155', color: '#e2e8f0', fontSize: 12, outline: 'none' }} />
                    <span style={{ color: '#64748b', fontSize: 11 }}>%</span>
                  </div>
                </div>

                {/* ABN contractor */}
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <div>
                    <div style={{ fontSize: 12, color: '#94a3b8' }}>🧾 ABN Contractor</div>
                    <div style={{ fontSize: 11, color: '#475569' }}>No tax withheld — you invoice the agency</div>
                  </div>
                  <button
                    onClick={() => saveRates({ ...payRates, agABN: !payRates.agABN })}
                    style={{ width: 40, height: 22, borderRadius: 11, border: 'none', cursor: 'pointer', background: payRates.agABN ? '#f59e0b' : '#334155', position: 'relative', transition: 'background 0.2s', flexShrink: 0 }}
                  >
                    <div style={{ position: 'absolute', top: 3, left: payRates.agABN ? 21 : 3, width: 16, height: 16, background: '#fff', borderRadius: '50%', transition: 'left 0.2s' }}></div>
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* PIN setup */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
            <div>
              <div style={{ fontSize: 13, color: '#cbd5e1', fontWeight: 600 }}>🔐 App PIN</div>
              <div style={{ fontSize: 11, color: '#64748b', marginTop: 2 }}>{localStorage.getItem(PIN_KEY) ? 'PIN is set — tap to change' : 'Set a PIN so you skip code entry on return visits'}</div>
            </div>
            <button onClick={() => {
              localStorage.removeItem('ENJ_UNLOCKED');
              localStorage.removeItem(PIN_KEY);
              window.location.reload();
            }} className="btn" style={{ padding: '7px 14px', background: '#1e3a5f', color: '#60a5fa', fontSize: 12, fontWeight: 600 }}>
              {localStorage.getItem(PIN_KEY) ? 'Change PIN' : 'Set PIN'}
            </button>
          </div>

          {/* Light mode */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div style={{ fontSize: 13, color: '#cbd5e1', fontWeight: 600 }}>☀️ Bright Mode</div>
            <button
              onClick={() => { const n = !lightMode; setLightMode(n); localStorage.setItem('ENJ_LIGHT', n ? '1' : '0'); }}
              style={{
                width: 40, height: 22, borderRadius: 11, border: 'none', cursor: 'pointer',
                background: lightMode ? '#3b82f6' : '#334155',
                position: 'relative', transition: 'background 0.2s',
              }}
            >
              <div style={{
                position: 'absolute', top: 3, left: lightMode ? 21 : 3,
                width: 16, height: 16, background: '#fff', borderRadius: '50%',
                transition: 'left 0.2s',
              }}></div>
            </button>
          </div>

          </div>{/* end scrollable body */}
        </div>
      )}

      {/* Tax modal */}
      {showTax && <TaxCalc allData={allData} onClose={() => setShowTax(false)} />}

      {/* ICS modal */}
      {showICS && <ICSModal allData={allData} onClose={() => setShowICS(false)} />}

      {/* LSL modal */}
      {showLSL && <LSLCalc payRates={payRates} holidayState={holidayState} onClose={() => setShowLSL(false)} />}

      {/* Leave Balances modal */}
      {showLeave && <LeaveTracker payRates={payRates} onClose={() => setShowLeave(false)} />}
    </div>
  );
}

// ── Root ───────────────────────────────────────────────────────────────────
function Root() {
  const [unlocked, setUnlocked] = useState(() => localStorage.getItem('ENJ_UNLOCKED') === 'true');
  const [restored, setRestored] = useState(false);

  function handleUnlock(isRestore) {
    setUnlocked(true);
    if (isRestore) {
      setRestored(true);
      setTimeout(() => setRestored(false), 4000);
    }
  }

  return (
    <div>
      {unlocked ? <App /> : <Paywall onUnlock={handleUnlock} />}
      {restored && (
        <div style={{
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          background: '#16a34a', color: '#fff', padding: '12px 24px', borderRadius: 12,
          fontWeight: 700, fontSize: 14, zIndex: 9999, boxShadow: '0 4px 20px rgba(0,0,0,0.4)',
          animation: 'none',
        }}>
          ✅ Welcome back! Access restored on this device.
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
