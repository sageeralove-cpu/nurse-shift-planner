// ── Cloud sync — pushes full user data to Supabase (debounce handled at call site) ──
function ENJ_cloudSync() {
  const sync_token = localStorage.getItem('ENJ_SYNC_TOKEN');
  if (!sync_token) return;
  const payload = {
    _version: 2,
    shifts:      JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'),
    rates:       JSON.parse(localStorage.getItem(RATES_KEY)   || 'null'),
    lsl:         JSON.parse(localStorage.getItem(LSL_KEY)     || 'null'),
    leave:       JSON.parse(localStorage.getItem(LEAVE_KEY)   || 'null'),
    taxSettings: JSON.parse(localStorage.getItem(TAX_KEY)     || 'null'),
  };
  fetch('/api/save-shifts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ sync_token, shift_data: payload }),
  }).catch(() => {}); // silent — never interrupt UX
}

// ── Australian Daylight Saving dates (first Sun in Oct = start, first Sun in Apr = end) ──
// Only NSW, VIC, SA, TAS, ACT observe DST. QLD, WA, NT do not.
const DST_STATES = ['NSW','VIC','SA','TAS','ACT'];
const AU_DST = [
  // { start: clocks forward at 2am→3am, end: clocks back at 3am→2am }
  { start: '2024-10-6',  end: '2025-4-6',  startLabel: 'Clocks go FORWARD 1 hour tonight at 2:00 am → 3:00 am', endLabel: 'Clocks go BACK 1 hour tonight at 3:00 am → 2:00 am' },
  { start: '2025-10-5',  end: '2026-4-5',  startLabel: 'Clocks go FORWARD 1 hour tonight at 2:00 am → 3:00 am', endLabel: 'Clocks go BACK 1 hour tonight at 3:00 am → 2:00 am' },
  { start: '2026-10-4',  end: '2027-4-4',  startLabel: 'Clocks go FORWARD 1 hour tonight at 2:00 am → 3:00 am', endLabel: 'Clocks go BACK 1 hour tonight at 3:00 am → 2:00 am' },
];
function getDSTAlert(state) {
  if (!DST_STATES.includes(state)) return null;
  const now = new Date();
  const todayKey = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
  for (const d of AU_DST) {
    if (d.start === todayKey) return { type: 'forward', msg: d.startLabel };
    if (d.end === todayKey)   return { type: 'back',    msg: d.endLabel };
  }
  return null;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function parseTime(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function addMinutes(t, mins) {
  const total = parseTime(t) + mins;
  const h = Math.floor(total / 60) % 24;
  const m = total % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function calcEndTime(start, durHr) {
  return addMinutes(start, Math.round(durHr * 60));
}

function durationLabel(h) {
  if (h < 1) return `${Math.round(h*60)}m`;
  if (h % 1 === 0) return `${h}hr`;
  const w = Math.floor(h);
  const m = Math.round((h % 1) * 60);
  return `${w}hr ${m}m`;
}

function parseDurChip(chip) {
  // "+0.5hr" -> 0.5
  const n = parseFloat(chip.replace('+','').replace('hr',''));
  return n;
}

function formatMoney(n) {
  if (!n && n !== 0) return '';
  return '$' + Number(n).toLocaleString('en-AU', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function getFY(date) {
  const d = date || new Date();
  const y = d.getFullYear();
  const m = d.getMonth(); // 0-indexed
  const fyStart = m >= 6 ? y : y - 1;
  return { start: new Date(fyStart, 6, 1), end: new Date(fyStart + 1, 5, 30), label: `FY ${fyStart}–${(fyStart+1).toString().slice(2)}`, fyStart };
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function getFortnightlyDates(startDate, count = 26) {
  const dates = [];
  let d = new Date(startDate);
  for (let i = 0; i < count; i++) {
    d = new Date(d);
    d.setDate(d.getDate() + 14);
    dates.push(dateKey(d.getFullYear(), d.getMonth(), d.getDate()));
  }
  return dates;
}

// ── Tax Calculator ─────────────────────────────────────────────────────────
function calcTax(gross, settings) {
  const { residency, tfThreshold, helpDebt } = settings;
  let tax = 0;
  let lito = 0;
  let medicare = 0;

  if (residency === 'resident') {
    // ATO FY 2025-26 brackets (Stage 3 cuts, unchanged from 2024-25)
    if (gross <= 18200) tax = 0;
    else if (gross <= 45000) tax = (gross - 18200) * 0.19;
    else if (gross <= 120000) tax = 5092 + (gross - 45000) * 0.325;
    else if (gross <= 180000) tax = 29467 + (gross - 120000) * 0.37;
    else tax = 51667 + (gross - 180000) * 0.45;

    if (!tfThreshold) {
      // No threshold — tax from $1
      if (gross <= 18200) tax = gross * 0.19;
    }

    // LITO — ATO FY 2025-26: $700 offset, tapers to $0 at $66,667
    if (gross <= 37500) lito = 700;
    else if (gross <= 45000) lito = 700 - (gross - 37500) * 0.05;      // reduces 5c per $1
    else if (gross <= 66667) lito = Math.max(0, 325 - (gross - 45000) * 0.015); // reduces 1.5c per $1
    else lito = 0;

    medicare = gross * 0.02;
  } else if (residency === 'nonresident') {
    if (gross <= 120000) tax = gross * 0.325;
    else if (gross <= 180000) tax = 39000 + (gross - 120000) * 0.37;
    else tax = 61200 + (gross - 180000) * 0.45;
    medicare = 0;
    lito = 0;
  } else if (residency === 'whm') {
    if (gross <= 45000) tax = gross * 0.15;
    else if (gross <= 120000) tax = 6750 + (gross - 45000) * 0.325;
    else if (gross <= 180000) tax = 31125 + (gross - 120000) * 0.37;
    else tax = 53325 + (gross - 180000) * 0.45;
    medicare = 0;
    lito = 0;
  }

  // HELP repayment
  let helpRepayment = 0;
  if (helpDebt && residency === 'resident') {
    if (gross >= 54435 && gross < 62738) helpRepayment = gross * 0.01;
    else if (gross >= 62738 && gross < 66502) helpRepayment = gross * 0.02;
    else if (gross >= 66502 && gross < 70469) helpRepayment = gross * 0.025;
    else if (gross >= 70469 && gross < 74700) helpRepayment = gross * 0.03;
    else if (gross >= 74700 && gross < 79151) helpRepayment = gross * 0.035;
    else if (gross >= 79151 && gross < 83900) helpRepayment = gross * 0.04;
    else if (gross >= 83900 && gross < 88900) helpRepayment = gross * 0.045;
    else if (gross >= 88900 && gross < 94232) helpRepayment = gross * 0.05;
    else if (gross >= 94232 && gross < 99887) helpRepayment = gross * 0.055;
    else if (gross >= 99887) helpRepayment = gross * 0.10;
  }

  const totalTax = Math.max(0, tax - lito) + medicare + helpRepayment;
  const net = gross - totalTax;
  const effectiveRate = gross > 0 ? (totalTax / gross) * 100 : 0;
  return {
    incomeTax: Math.max(0, tax - lito),
    rawTax: tax,
    lito,
    medicare,
    helpRepayment,
    totalTax,
    net,
    effectiveRate,
    fortnightlyNet: net / 26,
  };
}

function Keypad({ onDigit, onDelete }) {
  const keys = ['1','2','3','4','5','6','7','8','9','','0','⌫'];
  return (

      {keys.map((k, i) => k === '' ? <div key={i} /> : (
        <button key={i} onClick={() => k === '⌫' ? onDelete() : onDigit(k)} className="btn"
          style={{ padding: '17px 0', fontSize: 22, fontWeight: 600, background: k === '⌫' ? '#1e293b' : '#334155', color: k === '⌫' ? '#64748b' : '#f1f5f9', borderRadius: 14, border: '1px solid #475569' }}>
          {k}
        </button>
      ))}
    </div>
  );
}

function Paywall({ onUnlock }) {
  // view: 'paywall' | 'pin-enter' | 'pin-setup' | 'pin-new' | 'pin-confirm'
  const [view, setView] = useState(() => localStorage.getItem(PIN_KEY) ? 'pin-enter' : 'paywall');
  const [code, setCode] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [pin, setPin] = useState('');
  const [confirmPin, setConfirmPin] = useState('');
  const [pinError, setPinError] = useState('');
  const [pendingSyncToken, setPendingSyncToken] = useState('');
  const [biometricAvailable, setBiometricAvailable] = useState(false);
  const [showNoPinMsg, setShowNoPinMsg] = useState(false);
  const [codeCopied, setCodeCopied] = useState(false);
  const codeInputRef = useRef(null);

  function copySetupCode() {
    const myCode = localStorage.getItem('ENJ_MY_CODE') || code;
    navigator.clipboard?.writeText(myCode).then(() => { setCodeCopied(true); setTimeout(() => setCodeCopied(false), 2000); }).catch(() => {});
  }


  // Check if WebAuthn / biometric is available
  useEffect(() => {
    if (window.PublicKeyCredential) {
      window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable?.()
        .then(ok => setBiometricAvailable(ok)).catch(() => {});
    }
  }, []);

  function doUnlock(syncToken, isRestore) {
    localStorage.setItem('ENJ_UNLOCKED', 'true');
    if (syncToken) localStorage.setItem('ENJ_SYNC_TOKEN', syncToken);
    onUnlock(isRestore);
  }

  // ── PIN entry (returning user) ──────────────────────────────────────────
  function handlePinDigit(d) {
    const next = pin + d;
    setPin(next);
    setPinError('');
    if (next.length === 6) {
      const saved = localStorage.getItem(PIN_KEY);
      if (next === saved) {
        doUnlock(localStorage.getItem('ENJ_SYNC_TOKEN'), true);
      } else {
        setPinError('Incorrect PIN — try again');
        setTimeout(() => { setPin(''); setPinError(''); }, 900);
      }
    }
  }
  function handlePinDelete() { setPin(p => p.slice(0, -1)); setPinError(''); }

  // ── New PIN setup ───────────────────────────────────────────────────────
  function handleNewPinDigit(d) {
    const next = pin + d;
    setPin(next);
    if (next.length === 6) setTimeout(() => setView('pin-confirm'), 120);
  }
  function handleConfirmDigit(d) {
    const next = confirmPin + d;
    setConfirmPin(next);
    setPinError('');
    if (next.length === 6) {
      if (next === pin) {
        localStorage.setItem(PIN_KEY, pin);
        doUnlock(pendingSyncToken, false);
      } else {
        setPinError('PINs don\'t match — try again');
        setTimeout(() => { setConfirmPin(''); setPinError(''); }, 900);
      }
    }
  }
  function handleConfirmDelete() { setConfirmPin(p => p.slice(0, -1)); setPinError(''); }

  // ── Face ID / Touch ID via WebAuthn (best-effort) ────────────────────────
  async function tryBiometric() {
    try {
      const credential = await navigator.credentials.get({
        publicKey: {
          challenge: crypto.getRandomValues(new Uint8Array(32)),
          rpId: window.location.hostname,
          userVerification: 'required',
          timeout: 30000,
          allowCredentials: [],
        }
      });
      if (credential) doUnlock(localStorage.getItem('ENJ_SYNC_TOKEN'), true);
    } catch { setPinError('Biometric not set up — enter your PIN'); }
  }

  // ── Code submit ─────────────────────────────────────────────────────────
  async function submitCode(e) {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const res = await fetch('/api/verify-code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code.trim().toUpperCase() }),
      });
      const data = await res.json();
      if (data.valid) {
        if (data.sync_token) localStorage.setItem('ENJ_SYNC_TOKEN', data.sync_token);
        // Save the code so we can remind them to keep it somewhere safe
        localStorage.setItem('ENJ_MY_CODE', code.trim().toUpperCase());
        // Restore all cloud data to localStorage — App will pick it up fresh on mount
        const ud = data.user_data;
        if (ud && typeof ud === 'object') {
          if (ud._version === 2) {
            if (ud.shifts)      localStorage.setItem(STORAGE_KEY, JSON.stringify(ud.shifts));
            if (ud.rates)       localStorage.setItem(RATES_KEY,   JSON.stringify(ud.rates));
            if (ud.lsl)         localStorage.setItem(LSL_KEY,     JSON.stringify(ud.lsl));
            if (ud.leave)       localStorage.setItem(LEAVE_KEY,   JSON.stringify(ud.leave));
            if (ud.taxSettings) localStorage.setItem(TAX_KEY,     JSON.stringify(ud.taxSettings));
          } else {
            // Legacy v1 — just shifts
            localStorage.setItem(STORAGE_KEY, JSON.stringify(ud));
          }
        }
        setPendingSyncToken(data.sync_token || '');
        setView('pin-setup'); // offer PIN after first unlock
      } else {
        setError(data.error || 'Code not found — check your Ko-fi confirmation email');
      }
    } catch {
      setError('Connection error — please try again');
    }
    setLoading(false);
  }

  const wrapStyle = {
    minHeight: '100vh', background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%)',
    display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '24px',
  };

  // ── PIN entry (returning user) ─────────────────────────────────────────
  if (view === 'pin-enter') {
    return (
      <div style={wrapStyle}>
        <div style={{ maxWidth: 340, width: '100%', textAlign: 'center' }}>
          <div style={{ fontSize: 52, marginBottom: 8 }}>🏥</div>
          <div style={{ fontSize: 22, fontWeight: 800, color: '#f1f5f9', marginBottom: 4 }}>Nurse Shift Planner</div>
          <div style={{ fontSize: 14, color: '#64748b', marginBottom: 28 }}>Enter your PIN to unlock</div>

          <div style={{ background: '#1e293b', borderRadius: 20, border: '1px solid #334155', padding: '28px 24px' }}>
            <PinDots value={pin} error={pinError} />
            <div style={{ marginTop: 20 }}>
              <Keypad onDigit={handlePinDigit} onDelete={handlePinDelete} />
            </div>

            {biometricAvailable && (
              <button onClick={tryBiometric} className="btn"
                style={{ width: '100%', marginTop: 16, padding: '12px', background: '#1e293b', color: '#60a5fa', fontSize: 14, border: '1px solid #334155', borderRadius: 12 }}>
                🔒 Use Face ID / Touch ID
              </button>
            )}

            <button onClick={() => { setView('paywall'); setPin(''); setPinError(''); }}
              style={{ background: 'none', border: 'none', color: '#475569', fontSize: 12, cursor: 'pointer', marginTop: 16, textDecoration: 'underline' }}>
              Forgot PIN? Enter Ko-fi code instead
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── PIN setup offer (after first unlock) ──────────────────────────────
  if (view === 'pin-setup') {
    const myCode = localStorage.getItem('ENJ_MY_CODE') || code;
    return (
      <div style={wrapStyle}>
        <div style={{ maxWidth: 360, width: '100%', textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🔐</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: '#f1f5f9', marginBottom: 8 }}>Set a Quick-Access PIN?</div>
          <div style={{ fontSize: 14, color: '#94a3b8', marginBottom: 16, lineHeight: 1.6 }}>
            Set a 6-digit PIN so you don't need to enter your Ko-fi code every time.
            {biometricAvailable && ' On iOS, your PIN can be saved to iCloud Keychain and unlocked with Face ID.'}
          </div>

          {/* Code reminder box */}
          <div style={{ background: '#1e3a5f', border: '1px solid #1e40af', borderRadius: 12, padding: '14px 16px', marginBottom: 20, textAlign: 'left' }}>
            <div style={{ fontSize: 12, color: '#93c5fd', fontWeight: 700, marginBottom: 6 }}>📋 Save your Ko-fi code somewhere safe</div>
            <div style={{ fontSize: 11, color: '#7dd3fc', lineHeight: 1.5, marginBottom: 10 }}>
              You'll need this code to unlock the app on any new browser or device. Nobody remembers these — screenshot it, notes app, email yourself.
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ flex: 1, background: '#0f172a', borderRadius: 8, padding: '10px 12px', fontSize: 16, fontWeight: 800, letterSpacing: 4, color: '#f1f5f9', textAlign: 'center', border: '1px solid #334155' }}>
                {myCode}
              </div>
              <button onClick={copySetupCode} className="btn" style={{ padding: '10px 14px', background: codeCopied ? '#16a34a' : '#1d4ed8', color: '#fff', fontSize: 12, fontWeight: 700, borderRadius: 8, border: 'none', cursor: 'pointer', flexShrink: 0 }}>
                {codeCopied ? '✓ Copied' : 'Copy'}
              </button>
            </div>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            <button onClick={() => { setPin(''); setView('pin-new'); }} className="btn"
              style={{ padding: '14px', background: '#3b82f6', color: '#fff', fontSize: 15, fontWeight: 700, borderRadius: 12 }}>
              🔢 Set 6-digit PIN
            </button>
            <button onClick={() => doUnlock(pendingSyncToken, false)} className="btn"
              style={{ padding: '14px', background: '#1e293b', color: '#64748b', fontSize: 14, borderRadius: 12, border: '1px solid #334155' }}>
              Skip — enter code each time
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── New PIN entry ─────────────────────────────────────────────────────
  if (view === 'pin-new') {
    return (
      <div style={wrapStyle}>
        <div style={{ maxWidth: 340, width: '100%', textAlign: 'center' }}>
          <div style={{ fontSize: 20, fontWeight: 800, color: '#f1f5f9', marginBottom: 4 }}>Choose a PIN</div>
          <div style={{ fontSize: 13, color: '#64748b', marginBottom: 20 }}>Enter 6 digits</div>
          <div style={{ background: '#1e293b', borderRadius: 20, border: '1px solid #334155', padding: '28px 24px' }}>
            <PinDots value={pin} error={pinError} />
            <div style={{ marginTop: 20 }}>
              <Keypad onDigit={handleNewPinDigit} onDelete={() => setPin(p => p.slice(0,-1))} />
            </div>
            <button onClick={() => setView('pin-setup')}
              style={{ background: 'none', border: 'none', color: '#475569', fontSize: 12, cursor: 'pointer', marginTop: 16, textDecoration: 'underline' }}>Back</button>
          </div>
        </div>
      </div>
    );
  }

  // ── Confirm new PIN ───────────────────────────────────────────────────
  if (view === 'pin-confirm') {
    return (
      <div style={wrapStyle}>
        <div style={{ maxWidth: 340, width: '100%', textAlign: 'center' }}>
          <div style={{ fontSize: 20, fontWeight: 800, color: '#f1f5f9', marginBottom: 4 }}>Confirm PIN</div>
          <div style={{ fontSize: 13, color: '#64748b', marginBottom: 20 }}>Enter the same 6 digits again</div>
          <div style={{ background: '#1e293b', borderRadius: 20, border: '1px solid #334155', padding: '28px 24px' }}>
            <PinDots value={confirmPin} error={pinError} />
            <div style={{ marginTop: 20 }}>
              <Keypad onDigit={handleConfirmDigit} onDelete={() => { setConfirmPin(p => p.slice(0,-1)); setPinError(''); }} />
            </div>
            <button onClick={() => { setView('pin-new'); setPin(''); setConfirmPin(''); setPinError(''); }}
              style={{ background: 'none', border: 'none', color: '#475569', fontSize: 12, cursor: 'pointer', marginTop: 16, textDecoration: 'underline' }}>Back</button>
          </div>
        </div>
      </div>
    );
  }

  // ── Main paywall (first visit / forgot PIN) ───────────────────────────
  return (
    <div style={wrapStyle}>
      <div style={{ maxWidth: 480, width: '100%' }}>
        <div style={{ textAlign: 'center', marginBottom: 32 }}>
          <div style={{ fontSize: 56, marginBottom: 12 }}>🏥</div>
          <h1 style={{ fontSize: 28, fontWeight: 800, color: '#f1f5f9', marginBottom: 8 }}>Nurse Shift Planner</h1>
          <p style={{ color: '#94a3b8', fontSize: 15 }}>Built for Australian nurses by Elite Nurse Jackie</p>
        </div>

        <div style={{ background: '#1e293b', borderRadius: 20, border: '1px solid #334155', padding: '32px', marginBottom: 24 }}>
          <h2 style={{ fontSize: 18, fontWeight: 700, color: '#e2e8f0', marginBottom: 20 }}>What's included</h2>
          <ul style={{ listStyle: 'none', marginBottom: 28 }}>
            {[
              '📅 Monthly shift calendar with colour-coded shifts',
              '💰 Pay tracking with fortnightly repeating paydays',
              '🧮 Australian tax calculator (FY 2025–26)',
              '💪 Daily activity & wellness logging',
              '💼 External work / side hustle tracker',
              '📆 ICS export for iPhone, Mac & Google Calendar',
            ].map((f, i) => (
              <li key={i} style={{ padding: '7px 0', color: '#cbd5e1', fontSize: 14 }}>{f}</li>
            ))}
          </ul>

          <a href="https://ko-fi.com/elitenursejackie/shop" target="_blank" rel="noopener noreferrer"
            style={{ display: 'block', width: '100%', padding: '16px', borderRadius: 12, background: 'linear-gradient(135deg, #ff5f5f, #ff914d)', color: '#fff', fontSize: 17, fontWeight: 700, textAlign: 'center', textDecoration: 'none', marginBottom: 16, boxShadow: '0 4px 20px rgba(255,95,95,0.3)' }}>
            ☕ Support on Ko-fi to Access
          </a>

          <div style={{ marginTop: 8 }}>
            <div style={{ fontSize: 12, color: '#64748b', marginBottom: 4, textAlign: 'center' }}>Already paid? Enter your Ko-fi code below</div>
            <div style={{ fontSize: 11, color: '#475569', marginBottom: 10, textAlign: 'center', lineHeight: 1.5 }}>Using a new browser or the Home Screen icon? Enter your code — your shifts and settings will be restored automatically ☁️</div>
            <form onSubmit={submitCode}>
              <input
                ref={codeInputRef}
                type="text"
                value={code}
                onChange={e => setCode(e.target.value.toUpperCase())}
                placeholder="ENJ-XXXXXX"
                autoCapitalize="characters"
                autoCorrect="off"
                autoComplete="off"
                spellCheck="false"
                inputMode="text"
                style={{ width: '100%', padding: '16px', borderRadius: 10, border: error ? '1px solid #ef4444' : '1px solid #475569', background: '#0f172a', color: '#f1f5f9', fontSize: 18, outline: 'none', marginBottom: 10, letterSpacing: 4, textAlign: 'center', boxSizing: 'border-box' }}
              />
              {error && <p style={{ color: '#ef4444', fontSize: 13, marginBottom: 10, textAlign: 'center' }}>{error}</p>}
              <button type="submit" disabled={loading || !code.trim()} className="btn"
                style={{ width: '100%', padding: '14px', background: code.trim() ? '#3b82f6' : '#334155', color: '#fff', fontSize: 15, fontWeight: 700, borderRadius: 10, border: 'none', cursor: code.trim() ? 'pointer' : 'default', transition: 'background 0.2s' }}>
                {loading ? 'Checking…' : 'Unlock Access'}
              </button>
            </form>

            {/* PIN shortcut */}
            <div style={{ marginTop: 14, textAlign: 'center' }}>
              <button onClick={() => {
                if (localStorage.getItem(PIN_KEY)) {
                  setShowNoPinMsg(false);
                  setView('pin-enter');
                } else {
                  setShowNoPinMsg(v => !v);
                }
              }} style={{ background: 'none', border: 'none', color: '#60a5fa', fontSize: 13, fontWeight: 600, cursor: 'pointer', padding: 0, textDecoration: 'underline' }}>
                🔐 Already have a PIN?
              </button>
              {showNoPinMsg && (
                <div style={{ marginTop: 8, background: '#1e293b', border: '1px solid #334155', borderRadius: 10, padding: '12px 14px', textAlign: 'left' }}>
                  <div style={{ fontSize: 13, color: '#f1f5f9', fontWeight: 600, marginBottom: 4 }}>No PIN found on this device</div>
                  <div style={{ fontSize: 12, color: '#94a3b8', lineHeight: 1.6 }}>
                    PINs are saved to each browser/device separately. To restore your data and set up a PIN here, enter your Ko-fi code above — your shifts, pay rates and settings will all be restored automatically ☁️
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>

        <p style={{ color: '#475569', fontSize: 11, textAlign: 'center', lineHeight: 1.6 }}>
          Tax calculations are estimates only. Always consult a registered tax professional for accurate returns.
          For personal use only. Non-refundable.
        </p>
      </div>
    </div>
  );
}

// ── Shift Modal ────────────────────────────────────────────────────────────
function ShiftModal({ dateStr, data, allData, onSave, onClose, agencyMode }) {
  const existing = data || {};
  const [shiftType, setShiftType] = useState(existing.shiftType || '');
  const [duration, setDuration] = useState(existing.duration || '');
  const [startTime, setStartTime] = useState(existing.startTime || '');
  const [otChip, setOtChip] = useState(existing.otChip || 'None');
  const [otPosition, setOtPosition] = useState(existing.otPosition || 'after');
  const [isPayday, setIsPayday] = useState(existing.isPayday || false);
  const [payAmount, setPayAmount] = useState(existing.payAmount || '');
  const [isFortnightly, setIsFortnightly] = useState(existing.isFortnightly || false);
  const [regularAmount, setRegularAmount] = useState(existing.regularAmount || '');
  const [activities, setActivities] = useState(existing.activities || []);
  const [externalWork, setExternalWork] = useState(existing.externalWork || false);
  const [workplace, setWorkplace] = useState(existing.workplace || '');
  const [extHours, setExtHours] = useState(existing.extHours || '');
  const [extPay, setExtPay] = useState(existing.extPay || '');
  const [extPayType, setExtPayType] = useState(existing.extPayType || 'payg');
  const [inCharge, setInCharge] = useState(existing.inCharge || false);
  const [agencyClient, setAgencyClient] = useState(existing.agencyClient || '');
  const [confirmClear, setConfirmClear] = useState(false);
  const [actPreset, setActPreset] = useState(null);
  const [actDur, setActDur] = useState('');
  const [actCustomMins, setActCustomMins] = useState('');
  const [actCustomText, setActCustomText] = useState('');

  const hasData = existing.shiftType || existing.isPayday || (existing.activities || []).length > 0;

  const startOptions = duration === '8.5' ? START_TIMES_8_5 : duration === '12.5' ? START_TIMES_12_5 : [];
  const endTime = startTime && duration ? calcEndTime(startTime, parseFloat(duration)) : '';

  const otHours = otChip && otChip !== 'None' ? parseDurChip(otChip) : 0;
  const totalHours = duration ? parseFloat(duration) + otHours : otHours;

  let otStart = '', otEnd = '';
  if (startTime && duration && otHours > 0) {
    const durMins = parseFloat(duration) * 60;
    if (otPosition === 'before') {
      otStart = addMinutes(startTime, -otHours * 60);
      otEnd = startTime;
    } else {
      otStart = endTime;
      otEnd = addMinutes(endTime, otHours * 60);
    }
  }

  // Fortnightly dates
  const fnDates = isFortnightly ? getFortnightlyDates(dateStr) : [];

  function handleSave() {
    const dayData = {
      shiftType, duration, startTime, otChip, otPosition,
      isPayday, payAmount, isFortnightly, regularAmount,
      activities, externalWork, workplace, extHours, extPay, extPayType,
      inCharge, agencyClient,
    };
    const newAll = { ...allData };
    newAll[dateStr] = dayData;

    // Handle fortnightly
    if (isFortnightly && regularAmount) {
      fnDates.forEach(dk => {
        const existing2 = newAll[dk] || {};
        if (!existing2.fnOverride) {
          newAll[dk] = { ...existing2, isPayday: true, payAmount: regularAmount, fnRegular: regularAmount, fnSource: dateStr };
        }
      });
    }
    onSave(newAll);
  }

  function handleClear() {
    if (!confirmClear) { setConfirmClear(true); return; }
    const newAll = { ...allData };
    delete newAll[dateStr];
    onSave(newAll);
  }

  function addActivity() {
    if (activities.length >= 5) return;
    const label = actPreset ? `${actPreset.emoji} ${actPreset.label}` : actCustomText.trim();
    if (!label) return;
    const dur = actDur || (actCustomMins ? `${actCustomMins}m` : '');
    setActivities([...activities, { label, dur }]);
    setActPreset(null); setActDur(''); setActCustomMins(''); setActCustomText('');
  }

  const [parts] = dateStr.split('-').map(Number);
  const [yyyy, mm, dd] = dateStr.split('-').map(Number);
  const displayDate = new Date(yyyy, mm - 1, dd).toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{ position: 'relative' }}>
        {/* Header */}
        <div style={{ padding: '20px 20px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 16, color: '#f1f5f9' }}>
              {hasData ? '✏️ Edit Day' : '➕ New Entry'}
            </div>
            <div style={{ color: '#64748b', fontSize: 12, marginTop: 2 }}>{displayDate}</div>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {hasData && (
              confirmClear ? (
                <div style={{ display: 'flex', gap: 6 }}>
                  <button onClick={handleClear} className="btn" style={{ padding: '6px 12px', background: '#ef4444', color: '#fff', fontSize: 12 }}>Confirm clear</button>
                  <button onClick={() => setConfirmClear(false)} className="btn" style={{ padding: '6px 10px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>Cancel</button>
                </div>
              ) : (
                <button onClick={handleClear} className="btn" style={{ padding: '6px 10px', background: '#334155', color: '#ef4444', fontSize: 12 }}>🗑 Clear</button>
              )
            )}
            <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#64748b', fontSize: 22, cursor: 'pointer', lineHeight: 1 }}>×</button>
          </div>
        </div>
        <div style={{ padding: '0 20px 20px' }}>

          {/* Shift type */}
          <div style={{ marginBottom: 18 }}>
            <label style={{ display: 'block', fontSize: 12, color: '#94a3b8', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Shift Type</label>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {SHIFT_TYPES.map(s => (
                <button
                  key={s.id}
                  onClick={() => setShiftType(s.id)}
                  className="btn"
                  style={{
                    padding: '7px 12px', fontSize: 13, fontWeight: 600,
                    background: shiftType === s.id ? s.color : '#0f172a',
                    color: shiftType === s.id ? '#fff' : '#94a3b8',
                    border: `1px solid ${shiftType === s.id ? s.color : '#334155'}`,
                    borderRadius: 8,
                  }}
                >
                  {s.emoji} {s.label}
                </button>
              ))}
            </div>
          </div>

          {/* Duration */}
          <div style={{ marginBottom: 18 }}>
            <label style={{ display: 'block', fontSize: 12, color: '#94a3b8', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Duration</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {['8.5','12.5'].map(d => (
                <button
                  key={d}
                  onClick={() => { setDuration(d); setStartTime(''); }}
                  className="btn"
                  style={{
                    flex: 1, padding: '10px', fontSize: 14,
                    background: duration === d ? '#3b82f6' : '#0f172a',
                    color: duration === d ? '#fff' : '#94a3b8',
                    border: `1px solid ${duration === d ? '#3b82f6' : '#334155'}`,
                  }}
                >
                  {d}hr
                </button>
              ))}
            </div>
          </div>

          {/* Start time */}
          {duration && (
            <div style={{ marginBottom: 18 }}>
              <label style={{ display: 'block', fontSize: 12, color: '#94a3b8', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Start Time</label>
              <select
                value={startTime}
                onChange={e => setStartTime(e.target.value)}
                style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none' }}
              >
                <option value="">Select start time</option>
                {startOptions.map(t => (
                  <option key={t} value={t}>{t}</option>
                ))}
              </select>
              {startTime && (
                <div style={{ marginTop: 8, color: '#64748b', fontSize: 13 }}>
                  End time: <span style={{ color: '#93c5fd', fontWeight: 600 }}>{endTime}</span>
                </div>
              )}
            </div>
          )}

          {/* Overtime */}
          {duration && (
            <div style={{ marginBottom: 18 }}>
              <label style={{ display: 'block', fontSize: 12, color: '#94a3b8', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Overtime</label>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 10 }}>
                {['None', ...OT_CHIPS].map(c => (
                  <button
                    key={c}
                    onClick={() => setOtChip(c)}
                    className="btn"
                    style={{
                      padding: '5px 10px', fontSize: 12,
                      background: otChip === c ? '#f59e0b' : '#0f172a',
                      color: otChip === c ? '#000' : '#94a3b8',
                      border: `1px solid ${otChip === c ? '#f59e0b' : '#334155'}`,
                    }}
                  >
                    {c}
                  </button>
                ))}
              </div>
              {otChip !== 'None' && (
                <div>
                  <div style={{ display: 'flex', gap: 0, marginBottom: 10, borderRadius: 8, overflow: 'hidden', border: '1px solid #334155' }}>
                    <button
                      onClick={() => setOtPosition('before')}
                      className="btn"
                      style={{ flex: 1, padding: '8px', borderRadius: 0, background: otPosition === 'before' ? '#334155' : '#0f172a', color: otPosition === 'before' ? '#f1f5f9' : '#64748b', fontSize: 13 }}
                    >◀ Before shift</button>
                    <button
                      onClick={() => setOtPosition('after')}
                      className="btn"
                      style={{ flex: 1, padding: '8px', borderRadius: 0, background: otPosition === 'after' ? '#334155' : '#0f172a', color: otPosition === 'after' ? '#f1f5f9' : '#64748b', fontSize: 13 }}
                    >After shift ▶</button>
                  </div>
                  {startTime && (
                    <div style={{ background: '#0f172a', borderRadius: 8, padding: '12px', border: '1px solid #334155', fontSize: 13 }}>
                      {otPosition === 'before' ? (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                          <span style={{ color: '#f59e0b', fontWeight: 600 }}>OT {otStart}</span>
                          <span style={{ color: '#475569' }}>→</span>
                          <span style={{ color: '#60a5fa', fontWeight: 600 }}>Shift {startTime}</span>
                          <span style={{ color: '#475569' }}>→</span>
                          <span style={{ color: '#60a5fa', fontWeight: 600 }}>{endTime}</span>
                        </div>
                      ) : (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                          <span style={{ color: '#60a5fa', fontWeight: 600 }}>Shift {startTime}</span>
                          <span style={{ color: '#475569' }}>→</span>
                          <span style={{ color: '#60a5fa', fontWeight: 600 }}>{endTime}</span>
                          <span style={{ color: '#475569' }}>→</span>
                          <span style={{ color: '#f59e0b', fontWeight: 600 }}>OT {otEnd}</span>
                        </div>
                      )}
                      <div style={{ marginTop: 6, color: '#64748b', fontSize: 12 }}>Total: <span style={{ color: '#e2e8f0' }}>{durationLabel(totalHours)}</span></div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* Payday */}
          <div style={{ marginBottom: 18 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
              <label style={{ fontSize: 12, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1 }}>💰 Pay Day</label>
              <button
                onClick={() => setIsPayday(p => !p)}
                className="btn"
                style={{ padding: '4px 14px', fontSize: 13, background: isPayday ? '#16a34a' : '#334155', color: isPayday ? '#fff' : '#94a3b8' }}
              >
                {isPayday ? 'ON' : 'OFF'}
              </button>
            </div>
            {isPayday && (
              <div>
                <input
                  type="number"
                  value={payAmount}
                  onChange={e => setPayAmount(e.target.value)}
                  placeholder="After-tax amount ($)"
                  style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none', marginBottom: 10 }}
                />
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: isFortnightly ? 10 : 0 }}>
                  <span style={{ color: '#94a3b8', fontSize: 13 }}>🔁 Repeat Fortnightly</span>
                  <button
                    onClick={() => setIsFortnightly(p => !p)}
                    className="btn"
                    style={{ padding: '4px 14px', fontSize: 13, background: isFortnightly ? '#3b82f6' : '#334155', color: isFortnightly ? '#fff' : '#94a3b8' }}
                  >
                    {isFortnightly ? 'ON' : 'OFF'}
                  </button>
                </div>
                {isFortnightly && (
                  <div>
                    <input
                      type="number"
                      value={regularAmount}
                      onChange={e => setRegularAmount(e.target.value)}
                      placeholder="Regular fortnightly amount ($)"
                      style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none', marginBottom: 8 }}
                    />
                    <div style={{ fontSize: 12, color: '#64748b' }}>
                      Auto-fills the next 26 pay dates ({fnDates.length} dates).
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Activities */}
          <div style={{ marginBottom: 18 }}>
            <label style={{ display: 'block', fontSize: 12, color: '#94a3b8', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Activities {activities.length > 0 ? `(${activities.length}/5)` : ''}</label>
            {/* Existing pills */}
            {activities.length > 0 && (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 10 }}>
                {activities.map((a, i) => (
                  <span key={i} style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#334155', borderRadius: 20, padding: '4px 10px', fontSize: 13, color: '#e2e8f0' }}>
                    <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#3b82f6', display: 'inline-block' }}></span>
                    {a.label}{a.dur ? ` · ${a.dur}` : ''}
                    <button onClick={() => setActivities(activities.filter((_, j) => j !== i))} style={{ background: 'none', border: 'none', color: '#64748b', cursor: 'pointer', fontSize: 14, lineHeight: 1, padding: '0 2px' }}>×</button>
                  </span>
                ))}
              </div>
            )}
            {activities.length < 5 && (
              <>
                {/* Presets */}
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 10 }}>
                  {ACTIVITY_PRESETS.map(p => (
                    <button
                      key={p.label}
                      onClick={() => { setActPreset(actPreset?.label === p.label ? null : p); setActDur(''); setActCustomText(''); }}
                      className="btn"
                      style={{
                        padding: '5px 10px', fontSize: 12,
                        background: actPreset?.label === p.label ? '#3b82f6' : '#0f172a',
                        color: actPreset?.label === p.label ? '#fff' : '#94a3b8',
                        border: `1px solid ${actPreset?.label === p.label ? '#3b82f6' : '#334155'}`,
                      }}
                    >
                      {p.emoji} {p.label}
                    </button>
                  ))}
                </div>
                {/* Custom text */}
                <input
                  value={actCustomText}
                  onChange={e => { setActCustomText(e.target.value); if (e.target.value) setActPreset(null); }}
                  placeholder="Or type a custom activity…"
                  style={{ width: '100%', padding: '9px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 13, outline: 'none', marginBottom: 8 }}
                />
                {/* Duration picker shown when preset or custom text selected */}
                {(actPreset || actCustomText) && (
                  <div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 8 }}>
                      {DURATION_OPTIONS.map(d => (
                        <button
                          key={d}
                          onClick={() => setActDur(actDur === d ? '' : d)}
                          className="btn"
                          style={{
                            padding: '5px 10px', fontSize: 12,
                            background: actDur === d ? '#8b5cf6' : '#0f172a',
                            color: actDur === d ? '#fff' : '#94a3b8',
                            border: `1px solid ${actDur === d ? '#8b5cf6' : '#334155'}`,
                          }}
                        >
                          {d}
                        </button>
                      ))}
                      <input
                        type="number"
                        value={actCustomMins}
                        onChange={e => { setActCustomMins(e.target.value); setActDur(''); }}
                        placeholder="min"
                        style={{ width: 60, padding: '5px 8px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 12, outline: 'none' }}
                      />
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button
                        onClick={addActivity}
                        className="btn"
                        style={{ padding: '8px 16px', background: '#3b82f6', color: '#fff', fontSize: 13 }}
                      >
                        Add{actDur ? ` · ${actDur}` : actCustomMins ? ` · ${actCustomMins}m` : ''}
                      </button>
                      {!actDur && !actCustomMins && (
                        <button
                          onClick={addActivity}
                          className="btn"
                          style={{ padding: '8px 14px', background: '#334155', color: '#94a3b8', fontSize: 13 }}
                        >
                          Add (no time)
                        </button>
                      )}
                      <button
                        onClick={() => { setActPreset(null); setActDur(''); setActCustomMins(''); setActCustomText(''); }}
                        className="btn"
                        style={{ padding: '8px 14px', background: '#334155', color: '#94a3b8', fontSize: 13 }}
                      >
                        Cancel
                      </button>
                    </div>
                  </div>
                )}
              </>
            )}
          </div>

          {/* In Charge */}
          {shiftType && !['rdo','leave','off','sick'].includes(shiftType) && (
            <div style={{ marginBottom: 18 }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <label style={{ fontSize: 12, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1 }}>👑 In Charge</label>
                <button
                  onClick={() => setInCharge(p => !p)}
                  className="btn"
                  style={{ padding: '4px 14px', fontSize: 13, background: inCharge ? '#7c3aed' : '#334155', color: inCharge ? '#fff' : '#94a3b8' }}
                >
                  {inCharge ? 'YES' : 'NO'}
                </button>
              </div>
              {inCharge && <div style={{ fontSize: 11, color: '#7c3aed', marginTop: 5 }}>In-charge allowance will be applied to pay estimate</div>}
            </div>
          )}

          {/* Agency / Client name — only when agency mode active */}
          {agencyMode && shiftType && !['rdo','leave','off','sick'].includes(shiftType) && (
            <div style={{ marginBottom: 18 }}>
              <label style={{ fontSize: 12, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1, display: 'block', marginBottom: 8 }}>🏢 Agency / Hospital</label>
              <input
                value={agencyClient}
                onChange={e => setAgencyClient(e.target.value)}
                placeholder="Agency or hospital name (optional)"
                style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #0891b2', color: '#f1f5f9', fontSize: 14, outline: 'none' }}
              />
            </div>
          )}

          {/* External Work */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: externalWork ? 12 : 0 }}>
              <label style={{ fontSize: 12, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1 }}>💼 External Work / Side Hustle</label>
              <button
                onClick={() => setExternalWork(p => !p)}
                className="btn"
                style={{ padding: '4px 14px', fontSize: 13, background: externalWork ? '#0891b2' : '#334155', color: externalWork ? '#fff' : '#94a3b8' }}
              >
                {externalWork ? 'ON' : 'OFF'}
              </button>
            </div>
            {externalWork && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <input
                  value={workplace}
                  onChange={e => setWorkplace(e.target.value)}
                  placeholder="Workplace name"
                  style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none' }}
                />
                <input
                  type="number"
                  value={extHours}
                  onChange={e => setExtHours(e.target.value)}
                  placeholder="Hours worked"
                  style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none' }}
                />
                <input
                  type="number"
                  value={extPay}
                  onChange={e => setExtPay(e.target.value)}
                  placeholder="Pay received ($)"
                  style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none' }}
                />
                <div style={{ display: 'flex', gap: 8 }}>
                  {['payg','cash'].map(t => (
                    <button
                      key={t}
                      onClick={() => setExtPayType(t)}
                      className="btn"
                      style={{ flex: 1, padding: '9px', fontSize: 13, background: extPayType === t ? '#3b82f6' : '#0f172a', color: extPayType === t ? '#fff' : '#94a3b8', border: `1px solid ${extPayType === t ? '#3b82f6' : '#334155'}` }}
                    >
                      {t === 'payg' ? 'PAYG' : 'Cash'}
                    </button>
                  ))}
                </div>
                {extPayType === 'cash' && (
                  <div style={{ background: '#422006', border: '1px solid #92400e', borderRadius: 8, padding: '10px 14px', fontSize: 12, color: '#fbbf24' }}>
                    ⚠️ Cash income is taxable — declare in your return
                  </div>
                )}
              </div>
            )}
          </div>

          <button
            onClick={handleSave}
            className="btn"
            style={{ width: '100%', padding: '14px', background: '#3b82f6', color: '#fff', fontSize: 15, fontWeight: 700, borderRadius: 10 }}
          >
            Save Day ✓
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Tax Calculator ─────────────────────────────────────────────────────────
function TaxCalc({ allData, onClose }) {
  const [settings, setSettings] = useState(() => {
    try { return JSON.parse(localStorage.getItem(TAX_KEY)) || {}; } catch { return {}; }
  });
  const [showSettings, setShowSettings] = useState(false);
  const [priorIncome, setPriorIncome] = useState(settings.priorIncome || '');
  const [priorWithheld, setPriorWithheld] = useState(settings.priorWithheld || '');
  const [grossOverride, setGrossOverride] = useState(settings.grossOverride || '');
  const [editingGross, setEditingGross] = useState(false);

  const residency = settings.residency || 'resident';
  const tfThreshold = settings.tfThreshold !== false;
  const helpDebt = settings.helpDebt || false;

  const fy = getFY(new Date());

  // Sum pay from allData within FY
  let fyPay = 0;
  let fyExtPay = 0;
  Object.entries(allData).forEach(([dk, d]) => {
    const [y, m, day] = dk.split('-').map(Number);
    const date = new Date(y, m - 1, day);
    if (date >= fy.start && date <= fy.end) {
      if (d.isPayday && d.payAmount) fyPay += parseFloat(d.payAmount) || 0;
      if (d.externalWork && d.extPay) fyExtPay += parseFloat(d.extPay) || 0;
    }
  });

  const totalFYFromApp = fyPay + fyExtPay;
  const prior = parseFloat(priorIncome) || 0;
  const annualGross = grossOverride !== '' ? (parseFloat(grossOverride) || 0) : prior + totalFYFromApp;

  const taxResult = calcTax(annualGross, { residency, tfThreshold, helpDebt });
  const withheld = parseFloat(priorWithheld) || 0;
  const refundOrOwing = withheld - taxResult.totalTax;

  const brackets = [
    { range: '$0 – $18,200', rate: '0%', lower: 0, upper: 18200 },
    { range: '$18,201 – $45,000', rate: '19c/$1 over $18,200', lower: 18201, upper: 45000 },
    { range: '$45,001 – $120,000', rate: '32.5c/$1 over $45,000', lower: 45001, upper: 120000 },
    { range: '$120,001 – $180,000', rate: '37c/$1 over $120,000', lower: 120001, upper: 180000 },
    { range: '$180,001+', rate: '45c/$1 over $180,000', lower: 180001, upper: Infinity },
  ];

  function saveSettings(s, newPriorIncome, newPriorWithheld, newGrossOverride) {
    const pi = newPriorIncome !== undefined ? newPriorIncome : priorIncome;
    const pw = newPriorWithheld !== undefined ? newPriorWithheld : priorWithheld;
    const go = newGrossOverride !== undefined ? newGrossOverride : grossOverride;
    setSettings(s);
    localStorage.setItem(TAX_KEY, JSON.stringify({ ...s, priorIncome: pi, priorWithheld: pw, grossOverride: go }));
    ENJ_cloudSync();
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{ maxWidth: 580 }}>
        <div style={{ padding: '20px 20px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 17, color: '#f1f5f9' }}>Tax Calculator</div>
            <div style={{ fontSize: 12, color: '#3b82f6', fontWeight: 600, marginTop: 2 }}>
              {fy.label} · 1 Jul {fy.fyStart} – 30 Jun {fy.fyStart + 1}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <button onClick={() => setShowSettings(p => !p)} style={{ background: 'none', border: 'none', color: '#64748b', fontSize: 18, cursor: 'pointer' }}>⚙️</button>
            <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#64748b', fontSize: 22, cursor: 'pointer' }}>×</button>
          </div>
        </div>

        <div style={{ padding: '0 20px 20px' }}>
          {/* Settings panel */}
          {showSettings && (
            <div style={{ background: '#0f172a', borderRadius: 10, padding: 16, marginTop: 16, marginBottom: 4, border: '1px solid #334155' }}>
              <div style={{ fontWeight: 600, fontSize: 13, color: '#94a3b8', marginBottom: 12 }}>Settings</div>
              <div style={{ marginBottom: 12 }}>
                <label style={{ fontSize: 12, color: '#64748b', display: 'block', marginBottom: 6 }}>Residency Status</label>
                <div style={{ display: 'flex', gap: 6 }}>
                  {[['resident','🇦🇺 Resident'],['nonresident','🌏 Non-Resident'],['whm','✈️ WHM']].map(([v,l]) => (
                    <button key={v} onClick={() => saveSettings({ ...settings, residency: v })} className="btn"
                      style={{ flex: 1, padding: '7px 6px', fontSize: 11, background: residency === v ? '#3b82f6' : '#1e293b', color: residency === v ? '#fff' : '#94a3b8', border: `1px solid ${residency === v ? '#3b82f6' : '#334155'}` }}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
              {residency === 'resident' && (
                <>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                    <span style={{ fontSize: 13, color: '#94a3b8' }}>Tax-free threshold</span>
                    <button onClick={() => saveSettings({ ...settings, tfThreshold: !tfThreshold })} className="btn"
                      style={{ padding: '4px 14px', fontSize: 12, background: tfThreshold ? '#16a34a' : '#334155', color: tfThreshold ? '#fff' : '#94a3b8' }}>
                      {tfThreshold ? 'Yes' : 'No'}
                    </button>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                    <span style={{ fontSize: 13, color: '#94a3b8' }}>HELP / HECS debt</span>
                    <button onClick={() => saveSettings({ ...settings, helpDebt: !helpDebt })} className="btn"
                      style={{ padding: '4px 14px', fontSize: 12, background: helpDebt ? '#f59e0b' : '#334155', color: helpDebt ? '#000' : '#94a3b8' }}>
                      {helpDebt ? 'Yes' : 'No'}
                    </button>
                  </div>
                </>
              )}
              <div style={{ marginBottom: 10 }}>
                <label style={{ fontSize: 12, color: '#64748b', display: 'block', marginBottom: 5 }}>Prior FY income (gross $)</label>
                <input type="number" value={priorIncome} onChange={e => { const v = e.target.value; setPriorIncome(v); saveSettings({ ...settings }, v, priorWithheld); }}
                  placeholder="0"
                  style={{ width: '100%', padding: '9px 12px', borderRadius: 8, background: '#1e293b', border: '1px solid #334155', color: '#f1f5f9', fontSize: 13, outline: 'none' }} />
              </div>
              <div style={{ marginBottom: 10 }}>
                <label style={{ fontSize: 12, color: '#64748b', display: 'block', marginBottom: 5 }}>Tax already withheld ($)</label>
                <input type="number" value={priorWithheld} onChange={e => { const v = e.target.value; setPriorWithheld(v); saveSettings({ ...settings }, priorIncome, v); }}
                  placeholder="0"
                  style={{ width: '100%', padding: '9px 12px', borderRadius: 8, background: '#1e293b', border: '1px solid #334155', color: '#f1f5f9', fontSize: 13, outline: 'none' }} />
              </div>
              {residency !== 'resident' && (
                <div style={{ fontSize: 12, color: '#f59e0b', background: '#422006', borderRadius: 8, padding: '8px 12px' }}>
                  Note: ATO requires all income declared including cash payments.
                </div>
              )}
            </div>
          )}

          {/* Income tiles */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginTop: 16, marginBottom: 16 }}>
            {/* Before this app — directly editable */}
            <div style={{ background: '#0f172a', borderRadius: 10, padding: '12px', border: '1px solid #334155' }}>
              <div style={{ fontSize: 11, color: '#64748b', marginBottom: 4 }}>Before this app ✏️</div>
              <input
                type="number"
                value={priorIncome}
                onChange={e => { setPriorIncome(e.target.value); saveSettings({ ...settings }); }}
                placeholder="0"
                style={{ width: '100%', background: 'transparent', border: 'none', borderBottom: '1px solid #334155', color: '#94a3b8', fontSize: 14, fontWeight: 700, outline: 'none', padding: '2px 0' }}
              />
            </div>
            {[
              { label: 'Recorded in app', value: totalFYFromApp, color: '#3b82f6' },
              { label: 'Total FY Income', value: annualGross, color: '#10b981', bold: true },
            ].map((t, i) => (
              <div key={i} style={{ background: '#0f172a', borderRadius: 10, padding: '12px', border: `1px solid ${i === 1 ? '#10b981' : '#334155'}` }}>
                <div style={{ fontSize: 11, color: '#64748b', marginBottom: 4 }}>{t.label}</div>
                <div style={{ fontSize: t.bold ? 16 : 14, fontWeight: 700, color: t.color }}>{formatMoney(t.value)}</div>
              </div>
            ))}
          </div>

          {/* Tax breakdown */}
          <div style={{ background: '#0f172a', borderRadius: 12, padding: 16, marginBottom: 14, border: '1px solid #334155' }}>
            {/* Gross Income — tappable to override with payslip figure */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '1px solid #1e293b', fontSize: 13 }}>
              <span style={{ color: '#94a3b8', display: 'flex', alignItems: 'center', gap: 6 }}>
                Gross Income
                <button onClick={() => setEditingGross(g => !g)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 11, color: grossOverride !== '' ? '#f59e0b' : '#475569', padding: 0 }}>
                  {grossOverride !== '' ? '✏️ override' : '✏️'}
                </button>
              </span>
              {editingGross ? (
                <input
                  type="number"
                  autoFocus
                  value={grossOverride}
                  onChange={e => { const v = e.target.value; setGrossOverride(v); saveSettings({ ...settings }, undefined, undefined, v); }}
                  onBlur={() => setEditingGross(false)}
                  placeholder={String(Math.round(prior + totalFYFromApp))}
                  style={{ width: 120, padding: '4px 8px', borderRadius: 6, background: '#1e293b', border: '1px solid #f59e0b', color: '#f1f5f9', fontSize: 13, outline: 'none', textAlign: 'right' }}
                />
              ) : (
                <span style={{ color: grossOverride !== '' ? '#f59e0b' : '#f1f5f9', fontWeight: 600, cursor: 'pointer' }} onClick={() => setEditingGross(true)}>
                  {formatMoney(annualGross)}
                </span>
              )}
            </div>
            {grossOverride !== '' && (
              <div style={{ fontSize: 11, color: '#64748b', padding: '4px 0 2px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span>Auto-calculated: {formatMoney(prior + totalFYFromApp)}</span>
                <button onClick={() => { setGrossOverride(''); saveSettings({ ...settings }, undefined, undefined, ''); }} style={{ background: 'none', border: 'none', color: '#ef4444', fontSize: 11, cursor: 'pointer', padding: 0 }}>✕ clear override</button>
              </div>
            )}
            {[
              { label: 'Income Tax', value: -taxResult.rawTax, neg: true },
              { label: 'LITO Offset', value: taxResult.lito, pos: true },
              ...(residency === 'resident' ? [{ label: 'Medicare Levy (2%)', value: -taxResult.medicare, neg: true }] : []),
              ...(helpDebt && taxResult.helpRepayment > 0 ? [{ label: 'HELP Repayment', value: -taxResult.helpRepayment, neg: true }] : []),
            ].map((r, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid #1e293b', fontSize: 13, alignItems: 'center' }}>
                <span style={{ color: '#94a3b8' }}>{r.label}</span>
                <span style={{ color: r.neg ? '#ef4444' : r.pos ? '#10b981' : '#f1f5f9', fontWeight: 600 }}>
                  {r.neg || r.pos ? (r.neg ? '−' : '+') : ''}{formatMoney(Math.abs(r.value))}
                </span>
              </div>
            ))}
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0 2px', fontSize: 15 }}>
              <span style={{ color: '#e2e8f0', fontWeight: 700 }}>Net Income</span>
              <span style={{ color: '#10b981', fontWeight: 700 }}>{formatMoney(taxResult.net)}</span>
            </div>
          </div>

          {/* Effective rate */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#64748b', marginBottom: 4 }}>
              <span>Effective tax rate</span>
              <span style={{ color: '#f1f5f9', fontWeight: 600 }}>{taxResult.effectiveRate.toFixed(1)}%</span>
            </div>

// ── ICS Export ─────────────────────────────────────────────────────────────
function icsDate(y, m, d, timeStr, nextDay = false) {
  const [h, min] = timeStr ? timeStr.split(':').map(Number) : [0, 0];
  const dt = new Date(y, m, d, h, min, 0);
  if (nextDay) dt.setDate(dt.getDate() + 1);
  const pad = n => String(n).padStart(2, '0');
  return `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
}

function generateICS(allData) {
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Nurse Shift Planner//EN',
    'CALSCALE:GREGORIAN',
    'X-WR-TIMEZONE:Australia/Sydney',
  ];

  Object.entries(allData).forEach(([dk, d]) => {
    const [y, m, day] = dk.split('-').map(Number);
    const month = m - 1;

    if (d.shiftType && d.startTime && d.duration) {
      const s = SHIFT_MAP[d.shiftType];
      const otHours = d.otChip && d.otChip !== 'None' ? parseDurChip(d.otChip) : 0;
      const durMins = parseFloat(d.duration) * 60;
      let actualStart = d.startTime;
      let actualEnd = calcEndTime(d.startTime, parseFloat(d.duration));
      if (otHours > 0) {
        if (d.otPosition === 'before') actualStart = addMinutes(d.startTime, -otHours * 60);
        else actualEnd = addMinutes(actualEnd, otHours * 60);
      }

      const startDt = icsDate(y, month, day, actualStart);
      const endDt = icsDate(y, month, day, actualEnd, parseTime(actualEnd) < parseTime(actualStart));
      const actDesc = (d.activities || []).map(a => `${a.label}${a.dur ? ' ('+a.dur+')' : ''}`).join(', ');

      lines.push(
        'BEGIN:VEVENT',
        `DTSTART;TZID=Australia/Sydney:${startDt}`,
        `DTEND;TZID=Australia/Sydney:${endDt}`,
        `SUMMARY:${s.emoji} ${s.label} Shift${otHours > 0 ? ' (+OT)' : ''}`,
        `DESCRIPTION:${[
          `Shift: ${s.label}`,
          `Time: ${actualStart} – ${actualEnd}`,
          otHours > 0 ? `OT: ${durationLabel(otHours)} (${d.otPosition})` : '',
          actDesc ? `Activities: ${actDesc}` : '',
          d.externalWork && d.workplace ? `External work: ${d.workplace}` : '',
        ].filter(Boolean).join('\\n')}`,
        `UID:nurse-shift-${dk}@app`,
        'END:VEVENT',
      );
    }

    if (d.isPayday) {
      const [yy, mm, dd2] = dk.split('-').map(Number);
      lines.push(
        'BEGIN:VEVENT',
        `DTSTART;VALUE=DATE:${dk.replace(/-/g,'')}`,
        `DTEND;VALUE=DATE:${dk.replace(/-/g,'')}`,
        `SUMMARY:💰 Payday${d.payAmount ? ' ' + formatMoney(d.payAmount) : ''}`,
        `UID:nurse-pay-${dk}@app`,
        'END:VEVENT',
      );
    }
  });

  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function CalCell({ year, month, day, data, isToday, isWeekend, holiday, onOpen, onTooltip, onTooltipHide }) {
  const ref = useRef(null);
  const timerRef = useRef(null);

  if (!day) return <div style={{ background: 'transparent' }}></div>;

  const d = data || {};
  const s = d.shiftType ? SHIFT_MAP[d.shiftType] : null;
  const otHours = d.otChip && d.otChip !== 'None' ? parseDurChip(d.otChip) : 0;
  const hasData = d.shiftType || d.isPayday || (d.activities || []).length > 0 || d.externalWork;

  function handleMouseEnter(e) {
    if (!hasData) return;
    timerRef.current = setTimeout(() => {
      const rect = ref.current?.getBoundingClientRect();
      if (rect) onTooltip(e, d, rect);
    }, 80);
  }
  function handleMouseLeave() {
    clearTimeout(timerRef.current);
    onTooltipHide();
  }

  // Touch: long-press shows tooltip, tap still opens modal
  const touchStartRef = useRef(null);
  function handleTouchStart(e) {
    if (!hasData) return;
    const touch = e.touches[0];
    touchStartRef.current = { x: touch.clientX, y: touch.clientY, moved: false };
    timerRef.current = setTimeout(() => {
      const rect = ref.current?.getBoundingClientRect();
      if (rect && !touchStartRef.current?.moved) {
        onTooltip({ clientX: touch.clientX, clientY: touch.clientY }, d, rect);
      }
    }, 500);
  }
  function handleTouchMove() {
    if (touchStartRef.current) touchStartRef.current.moved = true;
    clearTimeout(timerRef.current);
    onTooltipHide();
  }
  function handleTouchEnd() {
    clearTimeout(timerRef.current);
    // Only hide tooltip after a short delay so user can see it
    setTimeout(() => onTooltipHide(), 1800);
  }

  return (
    <div
      ref={ref}
      onClick={() => onOpen(year, month, day)}
      onMouseEnter={handleMouseEnter}
      onMouseLeave={handleMouseLeave}
      onTouchStart={handleTouchStart}
      onTouchMove={handleTouchMove}
      onTouchEnd={handleTouchEnd}
      style={{
        background: isWeekend ? '#141f30' : '#1e293b',
        border: isToday ? '2px solid #3b82f6' : '1px solid #1e3a5f',
        borderRadius: 8,
        padding: '6px',
        cursor: 'pointer',
        minHeight: 72,
        transition: 'background 0.15s',
        position: 'relative',
        userSelect: 'none',
        overflow: 'hidden',
        minWidth: 0,
        boxSizing: 'border-box',
      }}
      onMouseOver={e => e.currentTarget.style.background = '#253347'}
      onMouseOut={e => e.currentTarget.style.background = isWeekend ? '#141f30' : '#1e293b'}
    >
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 4 }}>
        <div style={{
          fontSize: 12, fontWeight: isToday ? 700 : 400,
          color: isToday ? '#60a5fa' : isWeekend ? '#64748b' : '#94a3b8',
        }}>{day}</div>
        {holiday && <div style={{ fontSize: 8, color: '#f59e0b', fontWeight: 700, textAlign: 'right', lineHeight: 1.2, maxWidth: 48, wordBreak: 'break-word' }}>🎉</div>}
      </div>
      {holiday && (
        <div style={{ fontSize: 9, color: '#f59e0b', fontWeight: 600, marginBottom: 3, lineHeight: 1.2, wordBreak: 'break-word', whiteSpace: 'normal' }}>
          {holiday}
        </div>
      )}

      {s && (
        <div style={{
          background: s.color + '22', border: `1px solid ${s.color}55`,
          borderRadius: 5, padding: '2px 4px', fontSize: 11, color: s.color,
          fontWeight: 600, marginBottom: 3, display: 'flex', alignItems: 'center', gap: 2,
          overflow: 'hidden', minWidth: 0,
        }}>
          <span style={{ flexShrink: 0 }}>{s.emoji}</span>
          {d.startTime && <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', minWidth: 0 }}>{d.startTime}</span>}
          {otHours > 0 && <span style={{ background: '#f59e0b', color: '#000', borderRadius: 3, padding: '0 3px', fontSize: 9, flexShrink: 0 }}>OT</span>}
        </div>
      )}

      {d.isPayday && (
        <div style={{ fontSize: 11, color: '#fbbf24' }}>💰</div>
      )}

      {(d.activities || []).length > 0 && (
        <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap', marginTop: 2 }}>
          {(d.activities || []).map((_, i) => (
            <span key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: '#3b82f6', display: 'inline-block' }}></span>
          ))}
        </div>
      )}

      {d.externalWork && (
        <div style={{ fontSize: 10, background: '#0891b222', color: '#0891b2', borderRadius: 4, padding: '1px 4px', marginTop: 2, fontWeight: 600 }}>💼</div>
      )}
    </div>
  );
}

// ── Tooltip ────────────────────────────────────────────────────────────────
function Tooltip({ data, rect, colIndex }) {
  if (!rect || !data) return null;
  const d = data;
  const s = d.shiftType ? SHIFT_MAP[d.shiftType] : null;
  const otHours = d.otChip && d.otChip !== 'None' ? parseDurChip(d.otChip) : 0;
  const endTime = d.startTime && d.duration ? calcEndTime(d.startTime, parseFloat(d.duration)) : '';

  const isRight = colIndex >= 5;
  const style = {
    top: rect.top + window.scrollY,
    ...(isRight ? { right: window.innerWidth - rect.left + 8 } : { left: rect.right + 8 }),
  };

  return (
    <div className="tooltip" style={style}>
      {s && <div style={{ color: s.color, fontWeight: 700, marginBottom: 4 }}>{s.emoji} {s.label}</div>}
      {d.startTime && endTime && <div style={{ color: '#94a3b8', marginBottom: 4 }}>{d.startTime} → {endTime}</div>}
      {otHours > 0 && <div style={{ color: '#f59e0b', fontSize: 11, marginBottom: 4 }}>OT +{durationLabel(otHours)} ({d.otPosition})</div>}
      {d.isPayday && <div style={{ color: '#fbbf24', marginBottom: 4 }}>💰 {d.payAmount ? formatMoney(d.payAmount) : 'Pay day'}</div>}
      {(d.activities || []).map((a, i) => (
        <div key={i} style={{ color: '#64748b', fontSize: 11 }}>● {a.label}{a.dur ? ` · ${a.dur}` : ''}</div>
      ))}
    </div>
  );
}

// ── Leave Balances Tracker ────────────────────────────────────────────────
function LeaveTracker({ payRates, onClose }) {
  const base = parseFloat(payRates.base) || 0;

  const [leaveData, setLeaveData] = useState(() => {
    try { return JSON.parse(localStorage.getItem(LEAVE_KEY)) || {}; } catch { return {}; }
  });
  function saveLeave(d) { setLeaveData(d); localStorage.setItem(LEAVE_KEY, JSON.stringify(d)); ENJ_cloudSync(); }

  const [expandedId, setExpandedId]   = useState(null);
  const [addingFor,  setAddingFor]    = useState(null);
  const [entryType,  setEntryType]    = useState('use');   // 'use' | 'accrual'
  const [entryDate,  setEntryDate]    = useState('');
  const [entryHours, setEntryHours]   = useState('');
  const [entryNote,  setEntryNote]    = useState('');

  function getTypeData(id) { return leaveData[id] || {}; }
  function getBalance(id) {
    const d = getTypeData(id);
    const start = parseFloat(d.startBalance) || 0;
    return start + (d.entries || []).reduce((s, e) =>
      s + (e.type === 'accrual' ? (parseFloat(e.hours) || 0) : -(parseFloat(e.hours) || 0)), 0);
  }

  function updateStart(id, val) {
    const d = getTypeData(id);
    saveLeave({ ...leaveData, [id]: { ...d, startBalance: val } });
  }

  function addEntry(id) {
    const hrs = parseFloat(entryHours);
    if (!hrs || hrs <= 0) return;
    const d = getTypeData(id);
    const entry = { id: Date.now(), date: entryDate, hours: hrs, note: entryNote, type: entryType };
    saveLeave({ ...leaveData, [id]: { ...d, entries: [...(d.entries || []), entry] } });
    setEntryDate(''); setEntryHours(''); setEntryNote(''); setEntryType('use'); setAddingFor(null);
  }

  function removeEntry(leaveId, entryId) {
    const d = getTypeData(leaveId);
    saveLeave({ ...leaveData, [leaveId]: { ...d, entries: (d.entries || []).filter(e => e.id !== entryId) } });
  }

  const iStyle = { padding: '8px 10px', borderRadius: 8, background: '#1e293b', border: '1px solid #334155', color: '#f1f5f9', fontSize: 12, outline: 'none' };

  const totalHrsValue = LEAVE_TYPES.reduce((s, lt) => s + Math.max(0, getBalance(lt.id)), 0);

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{ padding: 0 }}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 24px 14px', borderBottom: '1px solid #334155', position: 'sticky', top: 0, background: '#1e293b', zIndex: 10, borderRadius: '16px 16px 0 0' }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 17, color: '#f1f5f9' }}>📋 Leave Balances</div>
            <div style={{ fontSize: 11, color: '#64748b', marginTop: 2 }}>
              Total positive balance: {totalHrsValue.toFixed(2)} hrs{base > 0 ? ` · ${formatMoney(totalHrsValue * base)}` : ''}
            </div>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#64748b', fontSize: 24, cursor: 'pointer' }}>×</button>
        </div>

        {/* Note */}
        <div style={{ padding: '10px 24px 0', fontSize: 11, color: '#475569', lineHeight: 1.5 }}>
          Enter your current balances from your payslip or HR system. Then log hours used (−) or accrued (+) to track your running balance.
        </div>

        {/* Leave type rows */}
        <div style={{ padding: '10px 16px 24px' }}>
          {LEAVE_TYPES.map(lt => {
            const balance    = getBalance(lt.id);
            const d          = getTypeData(lt.id);
            const entries    = d.entries || [];
            const isExpanded = expandedId === lt.id;
            const isAdding   = addingFor === lt.id;
            const balColor   = balance < 0 ? '#f87171' : balance === 0 ? '#64748b' : '#34d399';

            return (
              <div key={lt.id} style={{ borderRadius: 10, border: `1px solid ${isExpanded ? lt.color + '55' : '#1e293b'}`, marginBottom: 6, overflow: 'hidden', background: '#0f172a' }}>
                {/* Summary row */}
                <div
                  onClick={() => setExpandedId(isExpanded ? null : lt.id)}
                  style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 14px', cursor: 'pointer', userSelect: 'none' }}
                >
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span style={{ fontSize: 18 }}>{lt.emoji}</span>
                    <div>
                      <div style={{ fontSize: 13, color: '#e2e8f0', fontWeight: 600 }}>{lt.label}</div>
                      {entries.length > 0 && <div style={{ fontSize: 11, color: '#475569' }}>{entries.length} entr{entries.length === 1 ? 'y' : 'ies'} logged</div>}
                    </div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ textAlign: 'right' }}>
                      <div style={{ fontSize: 14, color: balColor, fontWeight: 700 }}>{balance >= 0 ? '' : '−'}{Math.abs(balance).toFixed(2)} hrs</div>
                      {base > 0 && balance !== 0 && <div style={{ fontSize: 11, color: '#475569' }}>{formatMoney(Math.abs(balance) * base)}</div>}
                    </div>
                    <span style={{ color: '#475569', fontSize: 12, transform: isExpanded ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s', display: 'inline-block' }}>▼</span>
                  </div>
                </div>

                {/* Expanded panel */}
                {isExpanded && (
                  <div style={{ borderTop: '1px solid #1e293b', padding: '12px 14px', display: 'flex', flexDirection: 'column', gap: 10 }}>

                    {/* Starting balance */}
                    <div>
                      <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.5 }}>Starting Balance (from payslip / HR)</div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <input type="number" step="0.001" value={d.startBalance || ''} onChange={e => updateStart(lt.id, e.target.value)}
                          placeholder="e.g. 140.4"
                          style={{ ...iStyle, flex: 1 }} />
                        <span style={{ color: '#64748b', fontSize: 12, whiteSpace: 'nowrap' }}>hrs</span>
                      </div>
                      {lt.id === 'ado' && (
                        <div style={{ fontSize: 11, color: '#0d9488', marginTop: 5, lineHeight: 1.6 }}>
                          💡 <strong>ADO is paid</strong> at ordinary rate when taken (e.g. 41.8 hrs × $56.52 on a Ramsay payslip). It appears on the calendar as a paid shift.<br/>
                          <strong>ADO BANKED</strong> on your payslip = hours deducted each fortnight and placed into your ADO bank (e.g. −1.80 hrs/fn). Log these as "+ Accrued" entries to track your bank growing. When you take an ADO day (8 hrs), log it as "− Used".
                        </div>
                      )}
                      {lt.id === 'banked' && (
                        <div style={{ fontSize: 11, color: '#6366f1', marginTop: 5, lineHeight: 1.5 }}>
                          💡 Banked Ordinary Hours accrue at 4 hrs per 80-hr fortnight at Ramsay. Use "+ Accrued" to log each fortnight's accrual.
                        </div>
                      )}
                    </div>

                    {/* Entry log */}
                    {entries.length > 0 && (
                      <div>
                        <div style={{ fontSize: 11, color: '#64748b', fontWeight: 600, marginBottom: 6, textTransform: 'uppercase', letterSpacing: 0.5 }}>History</div>
                        {entries.map(e => (
