// ── Helpers ────────────────────────────────────────────────────────────────
function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function parseTime(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function addMinutes(t, mins) {
  const total = parseTime(t) + mins;
  const h = Math.floor(total / 60) % 24;
  const m = total % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function calcEndTime(start, durHr) {
  return addMinutes(start, Math.round(durHr * 60));
}

function durationLabel(h) {
  if (h < 1) return `${Math.round(h*60)}m`;
  if (h % 1 === 0) return `${h}hr`;
  const w = Math.floor(h);
  const m = Math.round((h % 1) * 60);
  return `${w}hr ${m}m`;
}

function parseDurChip(chip) {
  // "+0.5hr" -> 0.5
  const n = parseFloat(chip.replace('+','').replace('hr',''));
  return n;
}

function formatMoney(n) {
  if (!n && n !== 0) return '';
  return '$' + Number(n).toLocaleString('en-AU', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function getFY(date) {
  const d = date || new Date();
  const y = d.getFullYear();
  const m = d.getMonth(); // 0-indexed
  const fyStart = m >= 6 ? y : y - 1;
  return { start: new Date(fyStart, 6, 1), end: new Date(fyStart + 1, 5, 30), label: `FY ${fyStart}–${(fyStart+1).toString().slice(2)}`, fyStart };
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function getFortnightlyDates(startDate, count = 26) {
  const dates = [];
  let d = new Date(startDate);
  for (let i = 0; i < count; i++) {
    d = new Date(d);
    d.setDate(d.getDate() + 14);
    dates.push(dateKey(d.getFullYear(), d.getMonth(), d.getDate()));
  }
  return dates;
}

// ── Tax Calculator ─────────────────────────────────────────────────────────
function calcTax(gross, settings) {
  const { residency, tfThreshold, helpDebt } = settings;
  let tax = 0;
  let lito = 0;
  let medicare = 0;

  if (residency === 'resident') {
    // ATO 2024-25 brackets
    if (gross <= 18200) tax = 0;
    else if (gross <= 45000) tax = (gross - 18200) * 0.19;
    else if (gross <= 120000) tax = 5092 + (gross - 45000) * 0.325;
    else if (gross <= 180000) tax = 29467 + (gross - 120000) * 0.37;
    else tax = 51667 + (gross - 180000) * 0.45;

    if (!tfThreshold) {
      // No threshold — tax from $1
      if (gross <= 18200) tax = gross * 0.19;
    }

    // LITO
    if (gross <= 37500) lito = 700;
    else if (gross <= 45000) lito = 700 - (gross - 37500) * (700 / 7500);
    else if (gross <= 66667) lito = lito = Math.max(0, (700 - (gross - 37500) * (700/7500)) - (gross - 45000) * (1500/21667));
    else lito = 0;
    lito = Math.max(0, lito);

    medicare = gross * 0.02;
  } else if (residency === 'nonresident') {
    if (gross <= 120000) tax = gross * 0.325;
    else if (gross <= 180000) tax = 39000 + (gross - 120000) * 0.37;
    else tax = 61200 + (gross - 180000) * 0.45;
    medicare = 0;
    lito = 0;
  } else if (residency === 'whm') {
    if (gross <= 45000) tax = gross * 0.15;
    else if (gross <= 120000) tax = 6750 + (gross - 45000) * 0.325;
    else if (gross <= 180000) tax = 31125 + (gross - 120000) * 0.37;
    else tax = 53325 + (gross - 180000) * 0.45;
    medicare = 0;
    lito = 0;
  }

  // HELP repayment
  let helpRepayment = 0;
  if (helpDebt && residency === 'resident') {
    if (gross >= 54435 && gross < 62738) helpRepayment = gross * 0.01;
    else if (gross >= 62738 && gross < 66502) helpRepayment = gross * 0.02;
    else if (gross >= 66502 && gross < 70469) helpRepayment = gross * 0.025;
    else if (gross >= 70469 && gross < 74700) helpRepayment = gross * 0.03;
    else if (gross >= 74700 && gross < 79151) helpRepayment = gross * 0.035;
    else if (gross >= 79151 && gross < 83900) helpRepayment = gross * 0.04;
    else if (gross >= 83900 && gross < 88900) helpRepayment = gross * 0.045;
    else if (gross >= 88900 && gross < 94232) helpRepayment = gross * 0.05;
    else if (gross >= 94232 && gross < 99887) helpRepayment = gross * 0.055;
    else if (gross >= 99887) helpRepayment = gross * 0.10;
  }

  const totalTax = Math.max(0, tax - lito) + medicare + helpRepayment;
  const net = gross - totalTax;
  const effectiveRate = gross > 0 ? (totalTax / gross) * 100 : 0;
  return {
    incomeTax: Math.max(0, tax - lito),
    rawTax: tax,
    lito,
    medicare,
    helpRepayment,
    totalTax,
    net,
    effectiveRate,
    fortnightlyNet: net / 26,
  };
}

        headers: { 'Content-Type': 'application/json' },

              '💪 Daily activity & wellness logging',

// ── Shift Modal ────────────────────────────────────────────────────────────
function ShiftModal({ dateStr, data, allData, onSave, onClose }) {
  const existing = data || {};
  const [shiftType, setShiftType] = useState(existing.shiftType || '');
  const [duration, setDuration] = useState(existing.duration || '');
  const [startTime, setStartTime] = useState(existing.startTime || '');
  const [otChip, setOtChip] = useState(existing.otChip || 'None');
  const [otPosition, setOtPosition] = useState(existing.otPosition || 'after');
  const [isPayday, setIsPayday] = useState(existing.isPayday || false);
  const [payAmount, setPayAmount] = useState(existing.payAmount || '');
  const [isFortnightly, setIsFortnightly] = useState(existing.isFortnightly || false);
  const [regularAmount, setRegularAmount] = useState(existing.regularAmount || '');
  const [activities, setActivities] = useState(existing.activities || []);
  const [externalWork, setExternalWork] = useState(existing.externalWork || false);
  const [workplace, setWorkplace] = useState(existing.workplace || '');
  const [extHours, setExtHours] = useState(existing.extHours || '');
  const [extPay, setExtPay] = useState(existing.extPay || '');
  const [extPayType, setExtPayType] = useState(existing.extPayType || 'payg');
  const [confirmClear, setConfirmClear] = useState(false);
  const [actPreset, setActPreset] = useState(null);
  const [actDur, setActDur] = useState('');
  const [actCustomMins, setActCustomMins] = useState('');
  const [actCustomText, setActCustomText] = useState('');

  const hasData = existing.shiftType || existing.isPayday || (existing.activities || []).length > 0;

  const startOptions = duration === '8.5' ? START_TIMES_8_5 : duration === '12.5' ? START_TIMES_12_5 : [];
  const endTime = startTime && duration ? calcEndTime(startTime, parseFloat(duration)) : '';

  const otHours = otChip && otChip !== 'None' ? parseDurChip(otChip) : 0;
  const totalHours = duration ? parseFloat(duration) + otHours : otHours;

  let otStart = '', otEnd = '';
  if (startTime && duration && otHours > 0) {
    const durMins = parseFloat(duration) * 60;
    if (otPosition === 'before') {
      otStart = addMinutes(startTime, -otHours * 60);
      otEnd = startTime;
    } else {
      otStart = endTime;
      otEnd = addMinutes(endTime, otHours * 60);
    }
  }

  // Fortnightly dates
  const fnDates = isFortnightly ? getFortnightlyDates(dateStr) : [];

  function handleSave() {
    const dayData = {
      shiftType, duration, startTime, otChip, otPosition,
      isPayday, payAmount, isFortnightly, regularAmount,
      activities, externalWork, workplace, extHours, extPay, extPayType,
    };
    const newAll = { ...allData };
    newAll[dateStr] = dayData;

    // Handle fortnightly
    if (isFortnightly && regularAmount) {
      fnDates.forEach(dk => {
        const existing2 = newAll[dk] || {};
        if (!existing2.fnOverride) {
          newAll[dk] = { ...existing2, isPayday: true, payAmount: regularAmount, fnRegular: regularAmount, fnSource: dateStr };
        }
      });
    }
    onSave(newAll);
  }

  function handleClear() {
    if (!confirmClear) { setConfirmClear(true); return; }
    const newAll = { ...allData };
    delete newAll[dateStr];
    onSave(newAll);
  }

  function addActivity() {
    if (activities.length >= 5) return;
    const label = actPreset ? `${actPreset.emoji} ${actPreset.label}` : actCustomText.trim();
    if (!label) return;
    const dur = actDur || (actCustomMins ? `${actCustomMins}m` : '');
    setActivities([...activities, { label, dur }]);
    setActPreset(null); setActDur(''); setActCustomMins(''); setActCustomText('');
  }

  const [parts] = dateStr.split('-').map(Number);
  const [yyyy, mm, dd] = dateStr.split('-').map(Number);
  const displayDate = new Date(yyyy, mm - 1, dd).toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{ position: 'relative' }}>
        {/* Header */}
        <div style={{ padding: '20px 20px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 16, color: '#f1f5f9' }}>
              {hasData ? '✏️ Edit Day' : '➕ New Entry'}
            </div>
            <div style={{ color: '#64748b', fontSize: 12, marginTop: 2 }}>{displayDate}</div>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            {hasData && (
              confirmClear ? (
                <div style={{ display: 'flex', gap: 6 }}>
                  <button onClick={handleClear} className="btn" style={{ padding: '6px 12px', background: '#ef4444', color: '#fff', fontSize: 12 }}>Confirm clear</button>
                  <button onClick={() => setConfirmClear(false)} className="btn" style={{ padding: '6px 10px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>Cancel</button>
                </div>
              ) : (
                <button onClick={handleClear} className="btn" style={{ padding: '6px 10px', background: '#334155', color: '#ef4444', fontSize: 12 }}>🗑 Clear</button>
              )
            )}
            <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#64748b', fontSize: 22, cursor: 'pointer', lineHeight: 1 }}>×</button>
          </div>
        </div>
        <div style={{ padding: '0 20px 20px' }}>

          {/* Shift type */}
          <div style={{ marginBottom: 18 }}>
            <label style={{ display: 'block', fontSize: 12, color: '#94a3b8', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Shift Type</label>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {SHIFT_TYPES.map(s => (
                <button
                  key={s.id}
                  onClick={() => setShiftType(s.id)}
                  className="btn"
                  style={{
                    padding: '7px 12px', fontSize: 13, fontWeight: 600,
                    background: shiftType === s.id ? s.color : '#0f172a',
                    color: shiftType === s.id ? '#fff' : '#94a3b8',
                    border: `1px solid ${shiftType === s.id ? s.color : '#334155'}`,
                    borderRadius: 8,
                  }}
                >
                  {s.emoji} {s.label}
                </button>
              ))}
            </div>
          </div>

          {/* Duration */}
          <div style={{ marginBottom: 18 }}>
            <label style={{ display: 'block', fontSize: 12, color: '#94a3b8', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Duration</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {['8.5','12.5'].map(d => (
                <button
                  key={d}
                  onClick={() => { setDuration(d); setStartTime(''); }}
                  className="btn"
                  style={{
                    flex: 1, padding: '10px', fontSize: 14,
                    background: duration === d ? '#3b82f6' : '#0f172a',
                    color: duration === d ? '#fff' : '#94a3b8',
                    border: `1px solid ${duration === d ? '#3b82f6' : '#334155'}`,
                  }}
                >
                  {d}hr
                </button>
              ))}
            </div>
          </div>

          {/* Start time */}
          {duration && (
            <div style={{ marginBottom: 18 }}>
              <label style={{ display: 'block', fontSize: 12, color: '#94a3b8', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Start Time</label>
              <select
                value={startTime}
                onChange={e => setStartTime(e.target.value)}
                style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none' }}
              >
                <option value="">Select start time</option>
                {startOptions.map(t => (
                  <option key={t} value={t}>{t}</option>
                ))}
              </select>
              {startTime && (
                <div style={{ marginTop: 8, color: '#64748b', fontSize: 13 }}>
                  End time: <span style={{ color: '#93c5fd', fontWeight: 600 }}>{endTime}</span>
                </div>
              )}
            </div>
          )}

          {/* Overtime */}
          {duration && (
            <div style={{ marginBottom: 18 }}>
              <label style={{ display: 'block', fontSize: 12, color: '#94a3b8', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Overtime</label>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 10 }}>
                {['None', ...OT_CHIPS].map(c => (
                  <button
                    key={c}
                    onClick={() => setOtChip(c)}
                    className="btn"
                    style={{
                      padding: '5px 10px', fontSize: 12,
                      background: otChip === c ? '#f59e0b' : '#0f172a',
                      color: otChip === c ? '#000' : '#94a3b8',
                      border: `1px solid ${otChip === c ? '#f59e0b' : '#334155'}`,
                    }}
                  >
                    {c}
                  </button>
                ))}
              </div>
              {otChip !== 'None' && (
                <div>
                  <div style={{ display: 'flex', gap: 0, marginBottom: 10, borderRadius: 8, overflow: 'hidden', border: '1px solid #334155' }}>
                    <button
                      onClick={() => setOtPosition('before')}
                      className="btn"
                      style={{ flex: 1, padding: '8px', borderRadius: 0, background: otPosition === 'before' ? '#334155' : '#0f172a', color: otPosition === 'before' ? '#f1f5f9' : '#64748b', fontSize: 13 }}
                    >◀ Before shift</button>
                    <button
                      onClick={() => setOtPosition('after')}
                      className="btn"
                      style={{ flex: 1, padding: '8px', borderRadius: 0, background: otPosition === 'after' ? '#334155' : '#0f172a', color: otPosition === 'after' ? '#f1f5f9' : '#64748b', fontSize: 13 }}
                    >After shift ▶</button>
                  </div>
                  {startTime && (
                    <div style={{ background: '#0f172a', borderRadius: 8, padding: '12px', border: '1px solid #334155', fontSize: 13 }}>
                      {otPosition === 'before' ? (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                          <span style={{ color: '#f59e0b', fontWeight: 600 }}>OT {otStart}</span>
                          <span style={{ color: '#475569' }}>→</span>
                          <span style={{ color: '#60a5fa', fontWeight: 600 }}>Shift {startTime}</span>
                          <span style={{ color: '#475569' }}>→</span>
                          <span style={{ color: '#60a5fa', fontWeight: 600 }}>{endTime}</span>
                        </div>
                      ) : (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                          <span style={{ color: '#60a5fa', fontWeight: 600 }}>Shift {startTime}</span>
                          <span style={{ color: '#475569' }}>→</span>
                          <span style={{ color: '#60a5fa', fontWeight: 600 }}>{endTime}</span>
                          <span style={{ color: '#475569' }}>→</span>
                          <span style={{ color: '#f59e0b', fontWeight: 600 }}>OT {otEnd}</span>
                        </div>
                      )}
                      <div style={{ marginTop: 6, color: '#64748b', fontSize: 12 }}>Total: <span style={{ color: '#e2e8f0' }}>{durationLabel(totalHours)}</span></div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}

          {/* Payday */}
          <div style={{ marginBottom: 18 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
              <label style={{ fontSize: 12, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1 }}>💰 Pay Day</label>
              <button
                onClick={() => setIsPayday(p => !p)}
                className="btn"
                style={{ padding: '4px 14px', fontSize: 13, background: isPayday ? '#16a34a' : '#334155', color: isPayday ? '#fff' : '#94a3b8' }}
              >
                {isPayday ? 'ON' : 'OFF'}
              </button>
            </div>
            {isPayday && (
              <div>
                <input
                  type="number"
                  value={payAmount}
                  onChange={e => setPayAmount(e.target.value)}
                  placeholder="After-tax amount ($)"
                  style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none', marginBottom: 10 }}
                />
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: isFortnightly ? 10 : 0 }}>
                  <span style={{ color: '#94a3b8', fontSize: 13 }}>🔁 Repeat Fortnightly</span>
                  <button
                    onClick={() => setIsFortnightly(p => !p)}
                    className="btn"
                    style={{ padding: '4px 14px', fontSize: 13, background: isFortnightly ? '#3b82f6' : '#334155', color: isFortnightly ? '#fff' : '#94a3b8' }}
                  >
                    {isFortnightly ? 'ON' : 'OFF'}
                  </button>
                </div>
                {isFortnightly && (
                  <div>
                    <input
                      type="number"
                      value={regularAmount}
                      onChange={e => setRegularAmount(e.target.value)}
                      placeholder="Regular fortnightly amount ($)"
                      style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none', marginBottom: 8 }}
                    />
                    <div style={{ fontSize: 12, color: '#64748b' }}>
                      Auto-fills the next 26 pay dates ({fnDates.length} dates).
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Activities */}
          <div style={{ marginBottom: 18 }}>
            <label style={{ display: 'block', fontSize: 12, color: '#94a3b8', fontWeight: 600, marginBottom: 8, textTransform: 'uppercase', letterSpacing: 1 }}>Activities {activities.length > 0 ? `(${activities.length}/5)` : ''}</label>
            {/* Existing pills */}
            {activities.length > 0 && (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 10 }}>
                {activities.map((a, i) => (
                  <span key={i} style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#334155', borderRadius: 20, padding: '4px 10px', fontSize: 13, color: '#e2e8f0' }}>
                    <span style={{ width: 7, height: 7, borderRadius: '50%', background: '#3b82f6', display: 'inline-block' }}></span>
                    {a.label}{a.dur ? ` · ${a.dur}` : ''}
                    <button onClick={() => setActivities(activities.filter((_, j) => j !== i))} style={{ background: 'none', border: 'none', color: '#64748b', cursor: 'pointer', fontSize: 14, lineHeight: 1, padding: '0 2px' }}>×</button>
                  </span>
                ))}
              </div>
            )}
            {activities.length < 5 && (
              <>
                {/* Presets */}
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 10 }}>
                  {ACTIVITY_PRESETS.map(p => (
                    <button
                      key={p.label}
                      onClick={() => { setActPreset(actPreset?.label === p.label ? null : p); setActDur(''); setActCustomText(''); }}
                      className="btn"
                      style={{
                        padding: '5px 10px', fontSize: 12,
                        background: actPreset?.label === p.label ? '#3b82f6' : '#0f172a',
                        color: actPreset?.label === p.label ? '#fff' : '#94a3b8',
                        border: `1px solid ${actPreset?.label === p.label ? '#3b82f6' : '#334155'}`,
                      }}
                    >
                      {p.emoji} {p.label}
                    </button>
                  ))}
                </div>
                {/* Custom text */}
                <input
                  value={actCustomText}
                  onChange={e => { setActCustomText(e.target.value); if (e.target.value) setActPreset(null); }}
                  placeholder="Or type a custom activity…"
                  style={{ width: '100%', padding: '9px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 13, outline: 'none', marginBottom: 8 }}
                />
                {/* Duration picker shown when preset or custom text selected */}
                {(actPreset || actCustomText) && (
                  <div>
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5, marginBottom: 8 }}>
                      {DURATION_OPTIONS.map(d => (
                        <button
                          key={d}
                          onClick={() => setActDur(actDur === d ? '' : d)}
                          className="btn"
                          style={{
                            padding: '5px 10px', fontSize: 12,
                            background: actDur === d ? '#8b5cf6' : '#0f172a',
                            color: actDur === d ? '#fff' : '#94a3b8',
                            border: `1px solid ${actDur === d ? '#8b5cf6' : '#334155'}`,
                          }}
                        >
                          {d}
                        </button>
                      ))}
                      <input
                        type="number"
                        value={actCustomMins}
                        onChange={e => { setActCustomMins(e.target.value); setActDur(''); }}
                        placeholder="min"
                        style={{ width: 60, padding: '5px 8px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 12, outline: 'none' }}
                      />
                    </div>
                    <div style={{ display: 'flex', gap: 8 }}>
                      <button
                        onClick={addActivity}
                        className="btn"
                        style={{ padding: '8px 16px', background: '#3b82f6', color: '#fff', fontSize: 13 }}
                      >
                        Add{actDur ? ` · ${actDur}` : actCustomMins ? ` · ${actCustomMins}m` : ''}
                      </button>
                      {!actDur && !actCustomMins && (
                        <button
                          onClick={addActivity}
                          className="btn"
                          style={{ padding: '8px 14px', background: '#334155', color: '#94a3b8', fontSize: 13 }}
                        >
                          Add (no time)
                        </button>
                      )}
                      <button
                        onClick={() => { setActPreset(null); setActDur(''); setActCustomMins(''); setActCustomText(''); }}
                        className="btn"
                        style={{ padding: '8px 14px', background: '#334155', color: '#94a3b8', fontSize: 13 }}
                      >
                        Cancel
                      </button>
                    </div>
                  </div>
                )}
              </>
            )}
          </div>

          {/* External Work */}
          <div style={{ marginBottom: 24 }}>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: externalWork ? 12 : 0 }}>
              <label style={{ fontSize: 12, color: '#94a3b8', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1 }}>💼 External Work / Side Hustle</label>
              <button
                onClick={() => setExternalWork(p => !p)}
                className="btn"
                style={{ padding: '4px 14px', fontSize: 13, background: externalWork ? '#0891b2' : '#334155', color: externalWork ? '#fff' : '#94a3b8' }}
              >
                {externalWork ? 'ON' : 'OFF'}
              </button>
            </div>
            {externalWork && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                <input
                  value={workplace}
                  onChange={e => setWorkplace(e.target.value)}
                  placeholder="Workplace name"
                  style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none' }}
                />
                <input
                  type="number"
                  value={extHours}
                  onChange={e => setExtHours(e.target.value)}
                  placeholder="Hours worked"
                  style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none' }}
                />
                <input
                  type="number"
                  value={extPay}
                  onChange={e => setExtPay(e.target.value)}
                  placeholder="Pay received ($)"
                  style={{ width: '100%', padding: '10px 14px', borderRadius: 8, background: '#0f172a', border: '1px solid #334155', color: '#f1f5f9', fontSize: 14, outline: 'none' }}
                />
                <div style={{ display: 'flex', gap: 8 }}>
                  {['payg','cash'].map(t => (
                    <button
                      key={t}
                      onClick={() => setExtPayType(t)}
                      className="btn"
                      style={{ flex: 1, padding: '9px', fontSize: 13, background: extPayType === t ? '#3b82f6' : '#0f172a', color: extPayType === t ? '#fff' : '#94a3b8', border: `1px solid ${extPayType === t ? '#3b82f6' : '#334155'}` }}
                    >
                      {t === 'payg' ? 'PAYG' : 'Cash'}
                    </button>
                  ))}
                </div>
                {extPayType === 'cash' && (
                  <div style={{ background: '#422006', border: '1px solid #92400e', borderRadius: 8, padding: '10px 14px', fontSize: 12, color: '#fbbf24' }}>
                    ⚠️ Cash income is taxable — declare in your return
                  </div>
                )}
              </div>
            )}
          </div>

          <button
            onClick={handleSave}
            className="btn"
            style={{ width: '100%', padding: '14px', background: '#3b82f6', color: '#fff', fontSize: 15, fontWeight: 700, borderRadius: 10 }}
          >
            Save Day ✓
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Tax Calculator ─────────────────────────────────────────────────────────
function TaxCalc({ allData, onClose }) {
  const [settings, setSettings] = useState(() => {
    try { return JSON.parse(localStorage.getItem(TAX_KEY)) || {}; } catch { return {}; }
  });
  const [showSettings, setShowSettings] = useState(false);
  const [priorIncome, setPriorIncome] = useState(settings.priorIncome || '');
  const [priorWithheld, setPriorWithheld] = useState(settings.priorWithheld || '');

  const residency = settings.residency || 'resident';
  const tfThreshold = settings.tfThreshold !== false;
  const helpDebt = settings.helpDebt || false;

  const fy = getFY(new Date());

  // Sum pay from allData within FY
  let fyPay = 0;
  let fyExtPay = 0;
  Object.entries(allData).forEach(([dk, d]) => {
    const [y, m, day] = dk.split('-').map(Number);
    const date = new Date(y, m - 1, day);
    if (date >= fy.start && date <= fy.end) {
      if (d.isPayday && d.payAmount) fyPay += parseFloat(d.payAmount) || 0;
      if (d.externalWork && d.extPay) fyExtPay += parseFloat(d.extPay) || 0;
    }
  });

  const totalFYFromApp = fyPay + fyExtPay;
  const prior = parseFloat(priorIncome) || 0;
  const annualGross = prior + totalFYFromApp;

  const taxResult = calcTax(annualGross, { residency, tfThreshold, helpDebt });
  const withheld = parseFloat(priorWithheld) || 0;
  const refundOrOwing = withheld - taxResult.totalTax;

  const brackets = [
    { range: '$0 – $18,200', rate: '0%', lower: 0, upper: 18200 },
    { range: '$18,201 – $45,000', rate: '19c/$1 over $18,200', lower: 18201, upper: 45000 },
    { range: '$45,001 – $120,000', rate: '32.5c/$1 over $45,000', lower: 45001, upper: 120000 },
    { range: '$120,001 – $180,000', rate: '37c/$1 over $120,000', lower: 120001, upper: 180000 },
    { range: '$180,001+', rate: '45c/$1 over $180,000', lower: 180001, upper: Infinity },
  ];

  function saveSettings(s) {
    setSettings(s);
    localStorage.setItem(TAX_KEY, JSON.stringify({ ...s, priorIncome, priorWithheld }));
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{ maxWidth: 580 }}>
        <div style={{ padding: '20px 20px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <div>
            <div style={{ fontWeight: 700, fontSize: 17, color: '#f1f5f9' }}>Tax Calculator</div>
            <div style={{ fontSize: 12, color: '#3b82f6', fontWeight: 600, marginTop: 2 }}>
              {fy.label} · 1 Jul {fy.fyStart} – 30 Jun {fy.fyStart + 1}
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <button onClick={() => setShowSettings(p => !p)} style={{ background: 'none', border: 'none', color: '#64748b', fontSize: 18, cursor: 'pointer' }}>⚙️</button>
            <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#64748b', fontSize: 22, cursor: 'pointer' }}>×</button>
          </div>
        </div>

        <div style={{ padding: '0 20px 20px' }}>
          {/* Settings panel */}
          {showSettings && (
            <div style={{ background: '#0f172a', borderRadius: 10, padding: 16, marginTop: 16, marginBottom: 4, border: '1px solid #334155' }}>
              <div style={{ fontWeight: 600, fontSize: 13, color: '#94a3b8', marginBottom: 12 }}>Settings</div>
              <div style={{ marginBottom: 12 }}>
                <label style={{ fontSize: 12, color: '#64748b', display: 'block', marginBottom: 6 }}>Residency Status</label>
                <div style={{ display: 'flex', gap: 6 }}>
                  {[['resident','🇦🇺 Resident'],['nonresident','🌏 Non-Resident'],['whm','✈️ WHM']].map(([v,l]) => (
                    <button key={v} onClick={() => saveSettings({ ...settings, residency: v })} className="btn"
                      style={{ flex: 1, padding: '7px 6px', fontSize: 11, background: residency === v ? '#3b82f6' : '#1e293b', color: residency === v ? '#fff' : '#94a3b8', border: `1px solid ${residency === v ? '#3b82f6' : '#334155'}` }}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
              {residency === 'resident' && (
                <>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                    <span style={{ fontSize: 13, color: '#94a3b8' }}>Tax-free threshold</span>
                    <button onClick={() => saveSettings({ ...settings, tfThreshold: !tfThreshold })} className="btn"
                      style={{ padding: '4px 14px', fontSize: 12, background: tfThreshold ? '#16a34a' : '#334155', color: tfThreshold ? '#fff' : '#94a3b8' }}>
                      {tfThreshold ? 'Yes' : 'No'}
                    </button>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                    <span style={{ fontSize: 13, color: '#94a3b8' }}>HELP / HECS debt</span>
                    <button onClick={() => saveSettings({ ...settings, helpDebt: !helpDebt })} className="btn"
                      style={{ padding: '4px 14px', fontSize: 12, background: helpDebt ? '#f59e0b' : '#334155', color: helpDebt ? '#000' : '#94a3b8' }}>
                      {helpDebt ? 'Yes' : 'No'}
                    </button>
                  </div>
                </>
              )}
              <div style={{ marginBottom: 10 }}>
                <label style={{ fontSize: 12, color: '#64748b', display: 'block', marginBottom: 5 }}>Prior FY income (gross $)</label>
                <input type="number" value={priorIncome} onChange={e => { setPriorIncome(e.target.value); saveSettings({ ...settings }); }}
                  placeholder="0"
                  style={{ width: '100%', padding: '9px 12px', borderRadius: 8, background: '#1e293b', border: '1px solid #334155', color: '#f1f5f9', fontSize: 13, outline: 'none' }} />
              </div>
              <div style={{ marginBottom: 10 }}>
                <label style={{ fontSize: 12, color: '#64748b', display: 'block', marginBottom: 5 }}>Tax already withheld ($)</label>
                <input type="number" value={priorWithheld} onChange={e => { setPriorWithheld(e.target.value); saveSettings({ ...settings }); }}
                  placeholder="0"
                  style={{ width: '100%', padding: '9px 12px', borderRadius: 8, background: '#1e293b', border: '1px solid #334155', color: '#f1f5f9', fontSize: 13, outline: 'none' }} />
              </div>
              {residency !== 'resident' && (
                <div style={{ fontSize: 12, color: '#f59e0b', background: '#422006', borderRadius: 8, padding: '8px 12px' }}>
                  Note: ATO requires all income declared including cash payments.
                </div>
              )}
            </div>
          )}

          {/* Income tiles */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginTop: 16, marginBottom: 16 }}>
            {[
              { label: 'Before this app', value: prior, color: '#64748b' },
              { label: 'Recorded in app', value: totalFYFromApp, color: '#3b82f6' },
              { label: 'Total FY Income', value: annualGross, color: '#10b981', bold: true },
            ].map((t, i) => (
              <div key={i} style={{ background: '#0f172a', borderRadius: 10, padding: '12px', border: `1px solid ${i === 2 ? '#10b981' : '#334155'}` }}>
                <div style={{ fontSize: 11, color: '#64748b', marginBottom: 4 }}>{t.label}</div>
                <div style={{ fontSize: t.bold ? 16 : 14, fontWeight: 700, color: t.color }}>{formatMoney(t.value)}</div>
              </div>
            ))}
          </div>

          {/* Tax breakdown */}
          <div style={{ background: '#0f172a', borderRadius: 12, padding: 16, marginBottom: 14, border: '1px solid #334155' }}>
            {[
              { label: 'Gross Income', value: annualGross },
              { label: 'Income Tax', value: -taxResult.rawTax, neg: true },
              { label: 'LITO Offset', value: taxResult.lito, pos: true },
              ...(residency === 'resident' ? [{ label: 'Medicare Levy (2%)', value: -taxResult.medicare, neg: true }] : []),
              ...(helpDebt && taxResult.helpRepayment > 0 ? [{ label: 'HELP Repayment', value: -taxResult.helpRepayment, neg: true }] : []),
            ].map((r, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', borderBottom: '1px solid #1e293b', fontSize: 13 }}>
                <span style={{ color: '#94a3b8' }}>{r.label}</span>
                <span style={{ color: r.neg ? '#ef4444' : r.pos ? '#10b981' : '#f1f5f9', fontWeight: 600 }}>
                  {r.neg || r.pos ? (r.neg ? '−' : '+') : ''}{formatMoney(Math.abs(r.value))}
                </span>
              </div>
            ))}
            <div style={{ display: 'flex', justifyContent: 'space-between', padding: '10px 0 2px', fontSize: 15 }}>
              <span style={{ color: '#e2e8f0', fontWeight: 700 }}>Net Income</span>
              <span style={{ color: '#10b981', fontWeight: 700 }}>{formatMoney(taxResult.net)}</span>
            </div>
          </div>

          {/* Effective rate */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#64748b', marginBottom: 4 }}>
              <span>Effective tax rate</span>
              <span style={{ color: '#f1f5f9', fontWeight: 600 }}>{taxResult.effectiveRate.toFixed(1)}%</span>
            </div>
            <div style={{ height: 6, background: '#1e293b', borderRadius: 3, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${Math.min(taxResult.effectiveRate, 100)}%`, background: 'linear-gradient(90deg, #3b82f6, #8b5cf6)', borderRadius: 3 }}></div>
            </div>
          </div>

          <div style={{ background: '#0f172a', borderRadius: 8, padding: '10px 14px', marginBottom: 14, border: '1px solid #334155', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ color: '#94a3b8', fontSize: 13 }}>Fortnightly net</span>
            <span style={{ color: '#60a5fa', fontWeight: 700, fontSize: 15 }}>{formatMoney(taxResult.fortnightlyNet)}</span>
          </div>

          {/* Tax brackets */}
          {residency === 'resident' && (
            <div style={{ marginBottom: 14 }}>
              <div style={{ fontSize: 12, color: '#64748b', marginBottom: 8, fontWeight: 600, textTransform: 'uppercase', letterSpacing: 1 }}>ATO 2024–25 Tax Brackets</div>
              {brackets.map((b, i) => {
                const isActive = annualGross >= b.lower && (b.upper === Infinity ? true : annualGross <= b.upper);
                return (
                  <div key={i} style={{
                    display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    padding: '8px 10px', borderRadius: 8, marginBottom: 4, fontSize: 12,
                    background: isActive ? '#1e3a5f' : '#0f172a',
                    border: `1px solid ${isActive ? '#3b82f6' : '#1e293b'}`,
                  }}>
                    <span style={{ color: isActive ? '#93c5fd' : '#475569' }}>{b.range}</span>
                    <span style={{ color: isActive ? '#f1f5f9' : '#64748b', fontWeight: isActive ? 700 : 400 }}>{b.rate}</span>
                    {isActive && <span style={{ color: '#3b82f6', fontSize: 10, fontWeight: 700 }}>◀ YOU</span>}
                  </div>
                );
              })}
            </div>
          )}

          {/* FY tax picture */}
          <div style={{
            borderRadius: 12, padding: 16, marginBottom: 14,
            background: refundOrOwing >= 0 ? '#052e16' : '#450a0a',
            border: `1px solid ${refundOrOwing >= 0 ? '#16a34a' : '#dc2626'}`,
          }}>
            <div style={{ fontSize: 13, color: refundOrOwing >= 0 ? '#86efac' : '#fca5a5', marginBottom: 4 }}>
              {refundOrOwing >= 0 ? '🎉 Estimated Refund' : '⚠️ Estimated Tax Owing'}
            </div>
            <div style={{ fontSize: 24, fontWeight: 800, color: refundOrOwing >= 0 ? '#4ade80' : '#f87171' }}>
              {formatMoney(Math.abs(refundOrOwing))}
            </div>
            <div style={{ fontSize: 12, color: '#475569', marginTop: 4 }}>
              Tax withheld {formatMoney(withheld)} − Tax payable {formatMoney(taxResult.totalTax)}
            </div>
          </div>

          <p style={{ fontSize: 11, color: '#475569', textAlign: 'center', lineHeight: 1.6 }}>
            Tax estimates only. Consult a registered tax accountant for your tax return.
          </p>
        </div>
      </div>
    </div>
  );
}

// ── ICS Export ─────────────────────────────────────────────────────────────
function icsDate(y, m, d, timeStr, nextDay = false) {
  const [h, min] = timeStr ? timeStr.split(':').map(Number) : [0, 0];
  const dt = new Date(y, m, d, h, min, 0);
  if (nextDay) dt.setDate(dt.getDate() + 1);
  const pad = n => String(n).padStart(2, '0');
  return `${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}T${pad(dt.getHours())}${pad(dt.getMinutes())}00`;
}

function generateICS(allData) {
  const lines = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Nurse Shift Planner//EN',
    'CALSCALE:GREGORIAN',
    'X-WR-TIMEZONE:Australia/Sydney',
  ];

  Object.entries(allData).forEach(([dk, d]) => {
    const [y, m, day] = dk.split('-').map(Number);
    const month = m - 1;

    if (d.shiftType && d.startTime && d.duration) {
      const s = SHIFT_MAP[d.shiftType];
      const otHours = d.otChip && d.otChip !== 'None' ? parseDurChip(d.otChip) : 0;
      const durMins = parseFloat(d.duration) * 60;
      let actualStart = d.startTime;
      let actualEnd = calcEndTime(d.startTime, parseFloat(d.duration));
      if (otHours > 0) {
        if (d.otPosition === 'before') actualStart = addMinutes(d.startTime, -otHours * 60);
        else actualEnd = addMinutes(actualEnd, otHours * 60);
      }

      const startDt = icsDate(y, month, day, actualStart);
      const endDt = icsDate(y, month, day, actualEnd, parseTime(actualEnd) < parseTime(actualStart));
      const actDesc = (d.activities || []).map(a => `${a.label}${a.dur ? ' ('+a.dur+')' : ''}`).join(', ');

      lines.push(
        'BEGIN:VEVENT',
        `DTSTART;TZID=Australia/Sydney:${startDt}`,
        `DTEND;TZID=Australia/Sydney:${endDt}`,
        `SUMMARY:${s.emoji} ${s.label} Shift${otHours > 0 ? ' (+OT)' : ''}`,
        `DESCRIPTION:${[
          `Shift: ${s.label}`,
          `Time: ${actualStart} – ${actualEnd}`,
          otHours > 0 ? `OT: ${durationLabel(otHours)} (${d.otPosition})` : '',
          actDesc ? `Activities: ${actDesc}` : '',
          d.externalWork && d.workplace ? `External work: ${d.workplace}` : '',
        ].filter(Boolean).join('\\n')}`,
        `UID:nurse-shift-${dk}@app`,
        'END:VEVENT',
      );
    }

    if (d.isPayday) {
      const [yy, mm, dd2] = dk.split('-').map(Number);
      lines.push(
        'BEGIN:VEVENT',
        `DTSTART;VALUE=DATE:${dk.replace(/-/g,'')}`,
        `DTEND;VALUE=DATE:${dk.replace(/-/g,'')}`,
        `SUMMARY:💰 Payday${d.payAmount ? ' ' + formatMoney(d.payAmount) : ''}`,
        `UID:nurse-pay-${dk}@app`,
        'END:VEVENT',
      );
    }
  });

  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

    const ics = generateICS(allData);
    const blob = new Blob([ics], { type: 'text/calendar' });

    a.href = url;
    a.download = 'nurse-shifts.ics';
    a.click();

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={{ maxWidth: 460 }}>
        <div style={{ padding: '20px 20px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontWeight: 700, fontSize: 16, color: '#f1f5f9' }}>📆 Sync Calendar</div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: '#64748b', fontSize: 22, cursor: 'pointer' }}>×</button>
        </div>
        <div style={{ padding: '16px 20px 20px' }}>
          <button onClick={download} className="btn" style={{ width: '100%', padding: '13px', background: '#3b82f6', color: '#fff', fontSize: 15, fontWeight: 700, marginBottom: 20 }}>
            ⬇ Download .ics file
          </button>
          {[
            ['📱 iPhone / iPad', 'Tap the .ics file in Files → tap again → "Add All" to Calendar'],
            ['🍎 Mac', 'Double-click the .ics file → Calendar opens and imports events'],
            ['📅 Google Calendar', 'Open calendar.google.com → Settings → Import → upload .ics file'],

}

// ── Calendar Cell ──────────────────────────────────────────────────────────
function CalCell({ year, month, day, data, isToday, isWeekend, onOpen, onTooltip, onTooltipHide }) {
  const ref = useRef(null);
  const timerRef = useRef(null);

  if (!day) return <div style={{ background: 'transparent' }}></div>;

  const d = data || {};
  const s = d.shiftType ? SHIFT_MAP[d.shiftType] : null;
  const otHours = d.otChip && d.otChip !== 'None' ? parseDurChip(d.otChip) : 0;
  const hasData = d.shiftType || d.isPayday || (d.activities || []).length > 0 || d.externalWork;

  function handleMouseEnter(e) {
    if (!hasData) return;
    timerRef.current = setTimeout(() => {
      const rect = ref.current?.getBoundingClientRect();
      if (rect) onTooltip(e, d, rect);
    }, 80);
  }
  function handleMouseLeave() {
    clearTimeout(timerRef.current);
    onTooltipHide();
  }

  return (
    <div
      ref={ref}
      onClick={() => onOpen(year, month, day)}
      onMouseEnter={handleMouseEnter}
      onMouseLeave={handleMouseLeave}
      style={{
        background: isWeekend ? '#141f30' : '#1e293b',
        border: isToday ? '2px solid #3b82f6' : '1px solid #1e3a5f',
        borderRadius: 8,
        padding: '6px',
        cursor: 'pointer',
        minHeight: 72,
        transition: 'background 0.15s',
        position: 'relative',
        userSelect: 'none',
      }}
      onMouseOver={e => e.currentTarget.style.background = '#253347'}
      onMouseOut={e => e.currentTarget.style.background = isWeekend ? '#141f30' : '#1e293b'}
    >
      <div style={{
        fontSize: 12, fontWeight: isToday ? 700 : 400,
        color: isToday ? '#60a5fa' : isWeekend ? '#64748b' : '#94a3b8',
        marginBottom: 4,
      }}>{day}</div>

      {s && (
        <div style={{
          background: s.color + '22', border: `1px solid ${s.color}55`,
          borderRadius: 5, padding: '2px 5px', fontSize: 11, color: s.color,
          fontWeight: 600, marginBottom: 3, display: 'flex', alignItems: 'center', gap: 3,
        }}>
          <span>{s.emoji}</span>
          {d.startTime && <span>{d.startTime}</span>}
          {otHours > 0 && <span style={{ background: '#f59e0b', color: '#000', borderRadius: 3, padding: '0 3px', fontSize: 9 }}>OT</span>}
        </div>
      )}

      {d.isPayday && (
        <div style={{ fontSize: 11, color: '#fbbf24' }}>💰</div>
      )}

      {(d.activities || []).length > 0 && (
        <div style={{ display: 'flex', gap: 3, flexWrap: 'wrap', marginTop: 2 }}>
          {(d.activities || []).map((_, i) => (
            <span key={i} style={{ width: 6, height: 6, borderRadius: '50%', background: '#3b82f6', display: 'inline-block' }}></span>
          ))}
        </div>
      )}

      {d.externalWork && (
        <div style={{ fontSize: 10, background: '#0891b222', color: '#0891b2', borderRadius: 4, padding: '1px 4px', marginTop: 2, fontWeight: 600 }}>💼</div>
      )}
    </div>
  );
}

// ── Tooltip ────────────────────────────────────────────────────────────────
function Tooltip({ data, rect, colIndex }) {
  if (!rect || !data) return null;
  const d = data;
  const s = d.shiftType ? SHIFT_MAP[d.shiftType] : null;
  const otHours = d.otChip && d.otChip !== 'None' ? parseDurChip(d.otChip) : 0;
  const endTime = d.startTime && d.duration ? calcEndTime(d.startTime, parseFloat(d.duration)) : '';

  const isRight = colIndex >= 5;
  const style = {
    top: rect.top + window.scrollY,
    ...(isRight ? { right: window.innerWidth - rect.left + 8 } : { left: rect.right + 8 }),
  };

  return (
    <div className="tooltip" style={style}>
      {s && <div style={{ color: s.color, fontWeight: 700, marginBottom: 4 }}>{s.emoji} {s.label}</div>}
      {d.startTime && endTime && <div style={{ color: '#94a3b8', marginBottom: 4 }}>{d.startTime} → {endTime}</div>}
      {otHours > 0 && <div style={{ color: '#f59e0b', fontSize: 11, marginBottom: 4 }}>OT +{durationLabel(otHours)} ({d.otPosition})</div>}
      {d.isPayday && <div style={{ color: '#fbbf24', marginBottom: 4 }}>💰 {d.payAmount ? formatMoney(d.payAmount) : 'Pay day'}</div>}
      {(d.activities || []).map((a, i) => (
        <div key={i} style={{ color: '#64748b', fontSize: 11 }}>● {a.label}{a.dur ? ` · ${a.dur}` : ''}</div>
      ))}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────────────────
function App() {
  const [allData, setAllData] = useState(() => {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  });
  const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
  const [currentMonth, setCurrentMonth] = useState(new Date().getMonth());
  const [modalDay, setModalDay] = useState(null); // {year, month, day}
  const [showTax, setShowTax] = useState(false);
  const [showICS, setShowICS] = useState(false);
  const [tooltip, setTooltip] = useState(null); // {data, rect, col}
  const tooltipTimerRef = useRef(null);

  useEffect(() => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
  }, [allData]);

  const today = new Date();
  const firstDay = new Date(currentYear, currentMonth, 1);
  // Mon = 0 ... Sun = 6
  let startDow = (firstDay.getDay() + 6) % 7; // Mon-based
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  function prevMonth() {
    if (currentMonth === 0) { setCurrentYear(y => y - 1); setCurrentMonth(11); }
    else setCurrentMonth(m => m - 1);
  }
  function nextMonth() {
    if (currentMonth === 11) { setCurrentYear(y => y + 1); setCurrentMonth(0); }
    else setCurrentMonth(m => m + 1);
  }
  function goToday() {
    setCurrentYear(today.getFullYear());
    setCurrentMonth(today.getMonth());
  }

  // Monthly stats
  const monthStats = useMemo(() => {
    const counts = {};
    SHIFT_TYPES.forEach(s => counts[s.id] = 0);
    let totalPay = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const dk = dateKey(currentYear, currentMonth, d);
      const data = allData[dk];
      if (data?.shiftType) counts[data.shiftType] = (counts[data.shiftType] || 0) + 1;
      if (data?.isPayday && data?.payAmount) totalPay += parseFloat(data.payAmount) || 0;
    }
    return { counts, totalPay };
  }, [allData, currentYear, currentMonth, daysInMonth]);

  function backup() {
    const blob = new Blob([JSON.stringify(allData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `nurse-shift-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
  }

  function load() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const parsed = JSON.parse(ev.target.result);
          setAllData(parsed);
        } catch { alert('Invalid JSON file'); }
      };
      reader.readAsText(file);
    };
    input.click();
  }

  const monthName = new Date(currentYear, currentMonth, 1).toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });

  return (
    <div style={{ minHeight: '100vh', background: '#0f172a', fontFamily: 'Inter, sans-serif' }}>
      {/* Header */}
      <div style={{ background: '#1e293b', borderBottom: '1px solid #334155', padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
        <div style={{ flex: '0 0 auto', display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 20 }}>🏥</span>
          <span style={{ fontWeight: 800, fontSize: 16, color: '#f1f5f9' }}>Nurse Shift Planner</span>
          <span style={{ fontSize: 11, color: '#16a34a', background: '#052e16', borderRadius: 4, padding: '2px 6px', fontWeight: 700 }}>v5 ✓</span>
        </div>
        <div style={{ flex: 1 }}></div>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          <button onClick={() => setShowTax(true)} className="btn" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>🧮 Tax Calc</button>
          <button onClick={() => setShowICS(true)} className="btn" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>📆 Sync Calendar</button>
          <button onClick={backup} className="btn" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>💾 Backup</button>
          <button onClick={load} className="btn" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12 }}>📂 Load</button>
          <a href="community.html" style={{ padding: '7px 12px', background: '#334155', color: '#94a3b8', fontSize: 12, borderRadius: 8, textDecoration: 'none', fontWeight: 600 }}>👥 Community</a>
        </div>
      </div>

      {/* Calendar nav + stats */}
      <div style={{ padding: '16px 16px 8px', display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
        <button onClick={prevMonth} className="btn" style={{ padding: '8px 14px', background: '#334155', color: '#e2e8f0', fontSize: 16 }}>‹</button>
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 700, fontSize: 20, color: '#f1f5f9' }}>{monthName}</div>
          {/* Stats */}
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginTop: 6 }}>
            {SHIFT_TYPES.filter(s => monthStats.counts[s.id] > 0).map(s => (
              <span key={s.id} style={{ fontSize: 12, color: s.color, background: s.color + '22', borderRadius: 5, padding: '2px 7px', fontWeight: 600 }}>
                {s.emoji} {s.label}: {monthStats.counts[s.id]}
              </span>
            ))}
            {monthStats.totalPay > 0 && (
              <span style={{ fontSize: 12, color: '#fbbf24', background: '#fbbf2422', borderRadius: 5, padding: '2px 7px', fontWeight: 600 }}>
                💰 {formatMoney(monthStats.totalPay)}
              </span>
            )}
          </div>
        </div>
        <button onClick={goToday} className="btn" style={{ padding: '8px 14px', background: '#334155', color: '#94a3b8', fontSize: 13 }}>Today</button>
        <button onClick={nextMonth} className="btn" style={{ padding: '8px 14px', background: '#334155', color: '#e2e8f0', fontSize: 16 }}>›</button>
      </div>

      {/* Day headers */}
      <div style={{ padding: '0 16px', display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, marginBottom: 4 }}>
        {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map((d, i) => (
          <div key={d} style={{ textAlign: 'center', fontSize: 12, fontWeight: 600, color: i >= 5 ? '#475569' : '#64748b', padding: '4px 0' }}>{d}</div>
        ))}
      </div>

      {/* Grid */}
      <div style={{ padding: '0 16px 24px', display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={`empty-${i}`}></div>;
          const dk = dateKey(currentYear, currentMonth, day);
          const cellDate = new Date(currentYear, currentMonth, day);
          const isToday = isSameDay(cellDate, today);
          const dow = (cellDate.getDay() + 6) % 7;
          const isWeekend = dow >= 5;
          const colIndex = i % 7;
          return (
            <CalCell
              key={dk}
              year={currentYear} month={currentMonth} day={day}
              data={allData[dk]}
              isToday={isToday}
              isWeekend={isWeekend}
              onOpen={(y, m, d) => setModalDay({ year: y, month: m, day: d })}
              onTooltip={(e, data, rect) => setTooltip({ data, rect, col: colIndex })}
              onTooltipHide={() => setTooltip(null)}
            />
          );
        })}
      </div>

      {/* Shift type legend */}
      <div style={{ padding: '0 16px 24px', display: 'flex', flexWrap: 'wrap', gap: 8 }}>
        {SHIFT_TYPES.map(s => (
          <span key={s.id} style={{ fontSize: 12, color: s.color, display: 'flex', alignItems: 'center', gap: 4 }}>
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: s.color, display: 'inline-block' }}></span>
            {s.emoji} {s.label}
          </span>
        ))}
      </div>

      {/* Tooltip */}
      {tooltip && <Tooltip data={tooltip.data} rect={tooltip.rect} colIndex={tooltip.col} />}

      {/* Shift Modal */}
      {modalDay && (
        <ShiftModal
          dateStr={dateKey(modalDay.year, modalDay.month, modalDay.day)}
          data={allData[dateKey(modalDay.year, modalDay.month, modalDay.day)]}
          allData={allData}
          onSave={newData => { setAllData(newData); setModalDay(null); }}
          onClose={() => setModalDay(null)}
        />
      )}

      {/* Tax modal */}
      {showTax && <TaxCalc allData={allData} onClose={() => setShowTax(false)} />}

      {/* ICS modal */}
      {showICS && <ICSModal allData={allData} onClose={() => setShowICS(false)} />}
    </div>
  );
}

// ── Root ───────────────────────────────────────────────────────────────────
function Root() {
  const [unlocked, setUnlocked] = useState(() => localStorage.getItem('ENJ_UNLOCKED') === 'true');
  return unlocked ? <App /> : <Paywall onUnlock={() => setUnlocked(true)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
